      blocks+=`<div style="margin-bottom:18px">
        <div style="font-size:12px;font-weight:600;color:var(--tp);margin-bottom:6px">內容（自動合併預覽，確認匯入後會存成這樣）</div>
        <div style="white-space:pre-wrap;font-size:12.5px;padding:8px;background:#f0f7ff;border:0.5px solid #b8d4f0;border-radius:var(--rm);max-height:360px;overflow-y:auto">${escapeHtml(merged)}</div>
      </div>`;
    }
    body.innerHTML=blocks||'<div class="pholder">無異動內容可比對</div>';
  }
  document.getElementById('modal-viewtext').classList.add('open');
}

async function confirmSheetsImport(){
  const allRows=window._sheetsImportRows||[];
  const checkedIdx=new Set(Array.from(document.querySelectorAll('.sheets-row-chk:checked')).map(el=>parseInt(el.dataset.idx)));
  const rows=allRows.filter((p,i)=>checkedIdx.has(i));
  if(rows.length===0){showToast('請至少勾選一筆項目');return;}
  const area=document.getElementById('sheets-preview-area');
  const btn=area.querySelector('.btn-primary');
  setBtnLoading(btn,`處理中…(0/${rows.length})`);
  try{
    const {collection, doc, writeBatch, serverTimestamp} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    let added=0, updated=0, incomplete=0, done=0;
    const logEntries=[];
    const CHUNK=400; // 低於 Firestore 單一 batch 500 筆上限，保留餘裕
    for(let i=0;i<rows.length;i+=CHUNK){
      const chunk=rows.slice(i,i+CHUNK);
      const batch=writeBatch(window._db);
      for(const p of chunk){
        if(!p.category||!p.announcer||!p.issuedDate) incomplete++;
        if(p._status==='update'){
          const oldContent=p._oldData?(p._oldData.content||''):'';
          const mergedContent=p._contentChanged?mergeContent(oldContent,p.content||''):oldContent;
          batch.update(doc(window._db,'duty_briefs',p._docId),{
            category:p.category||'', announcer:p.announcer||'',
            expiryDate:p.expiryDate||null, content:mergedContent,
            lastSheetContent:p.content||'', seqNo:p.seqNo||'',
            updatedAt: serverTimestamp(), updatedBy: window._uid, updatedFromSheets:true
          });
          updated++;
          logEntries.push({docId:p._docId, title:p.title, extra:`Sheets更新，異動欄位：${(p._changed||[]).join('、')}`});
        } else {
          const ref=doc(collection(window._db,'duty_briefs'));
          batch.set(ref,{
            title:p.title, content:p.content, category:p.category||'', announcer:p.announcer||'',
            unit:'', issuedDate:p.issuedDate||null, expiryDate:p.expiryDate||null,
            lastSheetContent:p.content||'', seqNo:p.seqNo||'',
            attachments:[], status:'active',
            createdAt: serverTimestamp(), createdBy: window._uid, importedFromSheets:true
          });
          added++;
          logEntries.push({docId:ref.id, title:p.title, extra:'Sheets新增'});
        }
      }
      await batch.commit();
      done+=chunk.length;
      if(btn) btn.innerHTML = `<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> 處理中…(${done}/${rows.length})`;
    }
    setBtnSuccess(btn,'已完成');
    // 逐筆記錄異動明細，之後可在操作紀錄查到每一筆確切改了什麼
    for(const le of logEntries){
      await logActivity('duty', le.extra.startsWith('Sheets新增')?'create':'update', le.docId, le.title, le.extra);
    }
    const skipped=allRows.length-rows.length;
    showToast(`新增 ${added} 筆、更新 ${updated} 筆${incomplete?`，其中 ${incomplete} 筆欄位不全，已保留原資料`:''}${skipped?`，另有 ${skipped} 筆未勾選已略過`:''}`);
    area.innerHTML=`<div class="info-box"><i class="ti ti-info-circle"></i>已完成：新增 ${added} 筆、更新 ${updated} 筆${skipped?`，${skipped} 筆未勾選已略過`:''}${incomplete?`，其中 ${incomplete} 筆缺分類／宣達者／發布日期，資料仍完整處理，僅缺漏欄位留空，請於「勤前指示」頁面手動補登`:''}（每筆異動明細已記錄於操作紀錄，可供查詢）</div>`;
  }catch(e){
    setBtnError(btn);
    showToast('處理失敗：'+e.message);
  }
}

window.doLogin=async function(){

  if(_sessionUnsub){_sessionUnsub();_sessionUnsub=null;}
  try{sessionStorage.removeItem('lastRoute');}catch(e){}
  await signOut(auth);

let _sessionUnsub=null;
async function claimSession(uid){
  const {updateDoc,serverTimestamp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const sid=(crypto.randomUUID?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(36).slice(2)));
  window._mySessionId=sid;
  await updateDoc(doc(db,'users',uid),{activeSessionId:sid,lastLoginAt:serverTimestamp()});
  return sid;
}
function watchSession(uid){
  if(_sessionUnsub){_sessionUnsub();_sessionUnsub=null;}
  _sessionUnsub=onSnapshot(doc(db,'users',uid),(snap)=>{
    const data=snap.data();
    if(data&&data.activeSessionId&&window._mySessionId&&data.activeSessionId!==window._mySessionId){
      if(_sessionUnsub){_sessionUnsub();_sessionUnsub=null;}
      alert('此帳號已在其他裝置或分頁登入，您已被登出。');
      signOut(auth);
    }
  });
}
onAuthStateChanged(auth,async(user)=>{
  if(user){
    try{
      const ud=await getDoc(doc(db,'users',user.uid));const d=ud.exists()?ud.data():{};const level=d.level||'B';
      // ===== IP 綁定防護（S 級排除）=====
      if(level!=='S'){
        let curIP='';
        try{const r=await fetch('https://api.ipify.org?format=json');const j=await r.json();curIP=j.ip||'';}catch(e){curIP='';}
        if(curIP){
          try{
            const {updateDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
            if(!d.boundIP){
              // 首次登入，自動綁定目前 IP
              await updateDoc(doc(db,'users',user.uid),{boundIP:curIP});
              d.boundIP=curIP;
            }else if(d.boundIP!==curIP){
              const errEl=document.getElementById('l-err'),btn=document.getElementById('lbtn');
              errEl.innerHTML='<i class="ti ti-alert-circle"></i> 此帳號已綁定其他裝置／網路環境，如需異地使用請聯繫 S 級管理員解除綁定';
              btn.textContent='登入';btn.disabled=false;
              window._isFreshLogin=false;
              await signOut(auth);
              return;
            }
          }catch(ipErr){
            // 寫入 boundIP 失敗（例如 Firestore 規則尚未開放此欄位），暫時放行避免卡死登入，僅記錄於console供排查
            console.warn('IP 綁定寫入失敗，本次登入暫不強制：',ipErr);
          }
        }
      }
      window._level=level;
      window._uid=user.uid;
      const displayId=user.email.replace('tcm','').replace('@tmrt.com.tw','');
      window._displayName=d.name||displayId;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app-screen').style.display='flex';
      document.getElementById('uid-disp').textContent=d.name||displayId;
      const badge=document.getElementById('lv-badge');badge.textContent=level+'級';badge.className='badge lv-'+level.toLowerCase();
      if(level==='S'||level==='A'){document.getElementById('nsec-admin').style.display='';document.getElementById('ni-admin').style.display='flex';document.getElementById('sub-admin').style.display='none';document.getElementById('nch-orphan').style.display='';document.getElementById('nch-backfill').style.display='';}
      if(level==='S'){document.getElementById('nch-perm').style.display='';document.getElementById('nch-log').style.display='';}
      try{
        if(level==='S'){
          // S 級排除單一登入防護，可多裝置/多分頁同時登入，僅記錄最後登入時間
          const {updateDoc,serverTimestamp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          await updateDoc(doc(db,'users',user.uid),{lastLoginAt:serverTimestamp()});
        }else{
          await claimSession(user.uid);
          watchSession(user.uid);
        }
      }catch(sessErr){
        console.warn('登入紀錄寫入失敗，不影響本次登入：',sessErr);
      }
      buildRegTree();
      buildFormTree();
      if(window._isFreshLogin){
        window._isFreshLogin=false;
        try{sessionStorage.removeItem('lastRoute');}catch(e){}
        gp('readme',document.querySelector('.ni'));
      }else{
        let restored=null;
        try{ const saved=sessionStorage.getItem('lastRoute'); if(saved) restored=JSON.parse(saved); }catch(e){}
        if(restored&&restored.key){ gp(restored.key,null,restored.param); }
        else{ gp('readme',document.querySelector('.ni')); }
      }
    }catch(fatalErr){
      console.error('登入後處理發生錯誤：',fatalErr);
      const errEl=document.getElementById('l-err'),btn=document.getElementById('lbtn');
      if(errEl)errEl.innerHTML='<i class="ti ti-alert-circle"></i> 登入處理發生錯誤，請重新整理頁面後再試一次';
      if(btn){btn.textContent='登入';btn.disabled=false;}
    }
  }else{
    if(_sessionUnsub){_sessionUnsub();_sessionUnsub=null;}
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    document.getElementById('lbtn').textContent='登入';document.getElementById('lbtn').disabled=false;
  }
});
