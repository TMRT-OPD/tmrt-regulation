<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>規章查找系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--cp:#ffffff;--cs:#f5f5f4;--ct:#e8e8e6;--ci:#e6f1fb;--tp:#1a1a18;--ts:#6b6b67;--tt:#9e9e9a;--ti:#0c447c;--bt:#e0e0dc;--bs:#d0d0cc;--bi:#b5d4f4;--rm:6px;--rl:10px;--fs:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fs);background:var(--ct);display:flex;min-height:100vh;color:var(--tp)}
#login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--ct);padding:24px;width:100%}
.login-card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);width:360px;padding:32px 32px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.logo-area{text-align:center;margin-bottom:24px}
.logo-area img{height:52px;width:auto;display:block;margin:0 auto 10px}
.sys-name{font-size:16px;font-weight:500;color:var(--tp);margin-top:2px}
.sys-sub{font-size:11px;color:var(--ts);margin-top:3px}
.login-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}.login-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.login-label{font-size:12px;color:var(--ts);font-weight:500}
.input-wrap{position:relative}
.input-wrap input{font-family:var(--fs);font-size:13px;padding:8px 36px 8px 11px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);width:100%;transition:border-color .15s}
.input-wrap input:focus{outline:none;border-color:#378ADD}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tt);font-size:15px;padding:2px}
.login-btn{width:100%;padding:9px;font-size:13px;font-weight:500;background:#378ADD;color:#fff;border:none;border-radius:var(--rm);cursor:pointer;font-family:var(--fs);margin-top:4px}
.login-btn:hover{background:#185FA5}
.login-btn:disabled{background:var(--cs);color:var(--tt);cursor:not-allowed}
.login-err{font-size:11px;color:#E24B4A;display:flex;align-items:center;gap:4px;min-height:16px;margin-bottom:4px}
.login-footer{font-size:11px;color:var(--tt);margin-top:14px;text-align:center}
#app-screen{display:flex;min-height:100vh;width:100%}
.sidebar{width:220px;background:var(--cp);border-right:0.5px solid var(--bt);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sh{padding:14px 16px;border-bottom:0.5px solid var(--bt)}
.sl{font-size:13px;font-weight:500;color:var(--tp)}
.ss{font-size:11px;color:var(--ts);margin-top:2px}
.su{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:5px;color:var(--ts)}
.nsec{padding:10px 16px 3px;font-size:10px;color:var(--tt);letter-spacing:.05em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:var(--ts);cursor:pointer;border-left:2px solid transparent;user-select:none}
.ni:hover{background:var(--cs);color:var(--tp)}
.ni.active{color:var(--ti);border-left-color:#378ADD;background:var(--ci)}
.ni i{font-size:16px;flex-shrink:0}
.na{margin-left:auto;font-size:13px;color:var(--tt);transition:transform .2s}
.nc{display:none;padding-left:12px;border-left:0.5px solid var(--bt);margin-left:28px}
.nch{display:block;padding:7px 12px;font-size:12px;color:var(--ts);cursor:pointer;border-left:2px solid transparent}
.nch:hover{color:var(--tp);background:var(--cs)}
.nch.active{color:var(--ti);border-left-color:#378ADD;background:var(--ci)}
.lgout{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;color:#E24B4A;cursor:pointer;margin-top:auto;border-top:0.5px solid var(--bt)}
.lgout:hover{background:#FCEBEB}
.main{flex:1;padding:20px 28px;background:var(--ct);overflow-y:auto}
.ptitle{font-size:18px;font-weight:500;color:var(--tp);margin-bottom:2px}
.psub{font-size:12px;color:var(--ts);margin-bottom:18px}
.card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);cursor:pointer;font-family:var(--fs)}
.btn:hover{background:var(--cs)}
.btn-primary{background:#378ADD;color:#fff;border-color:#378ADD}.btn-primary:hover{background:#185FA5}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}.btn-danger:hover{background:#A32D2D}
.btn-sm{padding:4px 9px;font-size:11px}
.tag{font-size:11px;padding:2px 7px;border-radius:var(--rm);border:0.5px solid;white-space:nowrap;display:inline-block}
.tag-revised{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.tag-unrevised{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.badge{font-size:11px;padding:2px 7px;border-radius:var(--rm);font-weight:500;display:inline-block;white-space:nowrap}
.lv-s{background:#EEEDFE;color:#3C3489}.lv-a{background:#e6f1fb;color:#0c447c}.lv-b{background:var(--cs);color:var(--ts)}
.sb{display:flex;align-items:center;gap:8px;background:var(--cp);border:0.5px solid var(--bs);border-radius:var(--rm);padding:7px 12px;margin-bottom:14px}
.sb input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--tp);font-family:var(--fs)}
.sb i{color:var(--tt);font-size:15px}
.vtbl{width:100%;border-collapse:collapse}
.vtbl th{text-align:left;padding:7px 11px;font-size:11px;color:var(--ts);font-weight:500;border-bottom:0.5px solid var(--bt);white-space:nowrap;background:var(--cs)}
.vtbl td{padding:8px 11px;border-bottom:0.5px solid var(--bt);color:var(--tp);font-size:12px;vertical-align:middle}
.vtbl tr:last-child td{border-bottom:none}
.vtbl tr:hover td{background:var(--cs)}
.empty{text-align:center;padding:36px 20px;color:var(--ts);font-size:13px}
.pholder{color:var(--ts);font-size:13px;padding:40px 0;text-align:center;border:1px dashed var(--bs);border-radius:var(--rl)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl2{font-size:12px;color:var(--ts);font-weight:500;display:block;margin-bottom:4px}
input[type=text],input[type=date],select,textarea{font-family:var(--fs);font-size:12px;padding:7px 9px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#378ADD}
textarea{resize:vertical;min-height:80px}
.info-box{background:var(--ci);border:0.5px solid var(--bi);border-radius:var(--rm);padding:10px 14px;font-size:12px;color:var(--ti);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.warn-box{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--rm);padding:10px 14px;font-size:12px;color:#633806;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--cp);border-radius:var(--rl);border:0.5px solid var(--bt);width:480px;max-height:86vh;overflow-y:auto}
.modal-hdr{padding:14px 18px;border-bottom:0.5px solid var(--bt);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:500}
.modal-body{padding:16px 18px}
.modal-ftr{padding:12px 18px;border-top:0.5px solid var(--bt);display:flex;justify-content:flex-end;gap:8px}
.perm-tbl{width:100%;border-collapse:collapse;font-size:12px}
.perm-tbl th{padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--bt);color:var(--ts);font-weight:500;background:var(--cs)}
.perm-tbl td{padding:8px 12px;border-bottom:0.5px solid var(--bt)}
.perm-tbl tr:last-child td{border-bottom:none}
.pck{color:#1D9E75;font-size:16px}.pcx{color:#E24B4A;font-size:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:12px;padding:8px 16px;border-radius:var(--rl);opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;white-space:nowrap}
.tabs{display:flex;border-bottom:0.5px solid var(--bt);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab:hover{color:var(--tp)}.tab.active{color:#378ADD;border-bottom-color:#378ADD}
.tabpane{display:none}.tabpane.active{display:block}
.upload-zone{border:1.5px dashed var(--bs);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;background:var(--cs);transition:border-color .15s,background .15s}
.upload-zone:hover{border-color:#378ADD;background:#f0f6fd}
.upload-zone.drag-over{border-color:#378ADD;background:#e6f1fb;border-style:solid}
.upload-zone i{font-size:28px;color:var(--tt);display:block;margin-bottom:8px}
.upload-zone span{font-size:12px;color:var(--ts)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;padding:5px 12px;border-radius:14px;border:1.5px solid transparent;cursor:pointer;user-select:none;white-space:nowrap;font-weight:500;transition:opacity .1s}
.chip:hover{opacity:.8}
.chip.active{border-color:currentColor}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:var(--rm);font-weight:500;display:inline-block;white-space:nowrap}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filter-select{width:auto;min-width:160px}
.list-card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--bs)}
.list-card.expired{background:#f8f9fa;border-left-color:#adb5bd}
.upload-progress{height:4px;background:var(--cs);border-radius:2px;margin-top:10px;overflow:hidden;display:none}
.upload-progress-bar{height:100%;background:#378ADD;border-radius:2px;width:0%;transition:width .3s}
.btn-success-temp{background:#1D9E75!important;border-color:#1D9E75!important}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rm);font-size:12px}
.file-item i{font-size:15px;color:var(--tt)}.file-item span{flex:1}
.file-item button{background:none;border:none;cursor:pointer;color:var(--tt);font-size:13px;padding:2px}
.file-item button:hover{color:#E24B4A}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>

function buildRegTree(){const c=document.getElementById('sub-reg');if(!c)return;c.innerHTML='';buildBranch(regTree,c,'');}
function buildBranch(node,container,path){for(const key in node){const fp=path?path+' / '+key:key;const ch=node[key];if(ch){const w=document.createElement('div');const t=document.createElement('div');t.className='nch';t.style.cssText='display:flex;justify-content:space-between;align-items:center';const ic=document.createElement('i');ic.className='ti ti-chevron-right';ic.style.cssText='font-size:11px;color:var(--tt);transition:transform .2s';t.appendChild(document.createTextNode(key));t.appendChild(ic);const s=document.createElement('div');s.style.cssText='display:none;padding-left:10px;border-left:0.5px solid var(--bt);margin-left:10px';t.onclick=()=>{const o=s.style.display==='block';s.style.display=o?'none':'block';ic.style.transform=o?'':'rotate(90deg)'};buildBranch(ch,s,fp);w.appendChild(t);w.appendChild(s);container.appendChild(w);if(key==='運務處(OPD)'){s.style.display='block';ic.style.transform='rotate(90deg)'}}else{const it=document.createElement('div');it.className='nch';it.textContent=key;it.onclick=()=>gp('reg-unit',it,fp);container.appendChild(it)}}}

function toggleSub(id,el){const s=document.getElementById(id);if(!s)return;const o=s.style.display==='block';s.style.display=o?'none':'block';const a=el.querySelector('.na');if(a)a.style.transform=o?'':'rotate(90deg)'}

function gp(key,el,param){
  document.querySelectorAll('.ni,.nch').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  const r=document.getElementById('main');
  const map={
    readme:pageReadme,search:pageSearch,
    duty:pageDuty,notice:pageNotice,
    'reg-unit':()=>pageRegUnit(param),
    'admin-upload-duty':pageUploadDuty,'admin-upload-notice':pageUploadNotice,
    'admin-upload-reg':pageUploadReg,'admin-revise':pageRevise,'admin-perm':pagePerm
  };
  r.innerHTML=(map[key]||(()=>'<div class="pholder">頁面開發中</div>'))();
  if(key==='admin-perm') initPermPage();
  if(key==='readme') setTimeout(loadReadmeReg, 0);
  if(key==='duty') setTimeout(loadDutyList, 0);
  if(key==='notice') setTimeout(loadNoticeList, 0);
  if(key==='admin-upload-reg') initDropZone('reg-drop-zone','rfs','rfl');
  if(key==='admin-upload-duty') { initDropZone('duty-drop-zone','dfs','dfl'); }
  if(key==='admin-upload-notice') initDropZone('notice-drop-zone','nfs','nfl');
}

  const state=kind==='duty'?window._dutyState:window._noticeState;

function toggleCatChip(kind,catId){
  const state=kind==='duty'?window._dutyState:window._noticeState;
  state.category=(state.category===catId)?'':catId;
  const sel=document.getElementById(`${kind}-cat-select`); if(sel) sel.value=state.category;
  document.querySelectorAll(`#${kind}-chip-row .chip`).forEach(ch=>ch.classList.toggle('active',ch.dataset.cat===state.category));
  kind==='duty'?renderDutyList():renderNoticeList();
}

function renderDutyList(){

  if(!area||!window._dutyDocs)return;
  const st=window._dutyState||{tab:'active',category:''};
  const today=new Date().toISOString().slice(0,10);
  const kw=(document.getElementById('duty-search')?.value||'').trim().toLowerCase();

    const expired=!!(d.expiryDate&&d.expiryDate<today);

async function loadRegList(unitName) {

}

async function loadUsers(){
  const tbody=document.getElementById('users-tbody');if(!tbody)return;
  if(!window._db){tbody.innerHTML='<tr><td colspan="5" class="empty">資料庫未連線</td></tr>';return}
  try{
    const {collection,getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDocs(collection(window._db,'users'));
    if(snap.empty){tbody.innerHTML='<tr><td colspan="5" class="empty">尚無帳號資料</td></tr>';return}
    tbody.innerHTML='';
    snap.forEach(d=>{

async function saveAcc(){

// ===== Firebase Storage 上傳共用函式 =====
async function uploadFile(file, storagePath) {
  const {ref, uploadBytes, getDownloadURL} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");
  const fileRef = ref(window._storage, storagePath);
  await uploadBytes(fileRef, file);
  return await getDownloadURL(fileRef);
}

// ===== 拖曳上傳 =====
function initDropZone(zoneId, inputId, listId) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const input = document.getElementById(inputId);
    if (!input) return;
    // 建立 DataTransfer 模擬 files 設定
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
    input.files = dt.files;
    showFiles(input, listId);
  });
}

// 按鈕狀態管理
function setBtnLoading(btn, text) {
  if (!btn) return;
  btn.disabled = true;
  btn._origHTML = btn.innerHTML;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> ' + text;
}
function setBtnSuccess(btn, text) {
  if (!btn) return;
  btn.classList.add('btn-success-temp');
  btn.innerHTML = '<i class="ti ti-check"></i> ' + text;
  setTimeout(() => {
    btn.classList.remove('btn-success-temp');
    btn.innerHTML = btn._origHTML || btn.innerHTML;
    btn.disabled = false;
  }, 2000);
}
function setBtnError(btn) {
  if (!btn) return;
  btn.innerHTML = btn._origHTML || btn.innerHTML;
  btn.disabled = false;
}
