<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>規章查找系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--color-background-primary:#ffffff;--color-background-secondary:#f5f5f4;--color-background-tertiary:#e8e8e6;--color-background-info:#e6f1fb;--color-text-primary:#1a1a18;--color-text-secondary:#6b6b67;--color-text-tertiary:#9e9e9a;--color-text-info:#0c447c;--color-border-tertiary:#e0e0dc;--color-border-secondary:#d0d0cc;--color-border-info:#b5d4f4;--border-radius-md:6px;--border-radius-lg:10px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;--font-mono:'SF Mono','Fira Code',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);display:flex;min-height:100vh}

/* ===== 登入頁 ===== */
#login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--color-background-tertiary);padding:24px;width:100%}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);width:360px;padding:32px 32px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.logo-area{text-align:center;margin-bottom:20px}
.sys-name{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-top:4px}
.sys-sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.login-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.login-label{font-size:12px;color:var(--color-text-secondary);font-weight:500}
.input-wrap{position:relative}
.input-wrap input{font-family:var(--font-sans);font-size:13px;padding:8px 36px 8px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);width:100%;transition:border-color .15s}
.input-wrap input:focus{outline:none;border-color:#378ADD}
.input-wrap input.inp-err{border-color:#E24B4A}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:15px;padding:2px}
.login-btn{width:100%;padding:9px;font-size:13px;font-weight:500;background:#378ADD;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;font-family:var(--font-sans);margin-top:4px}
.login-btn:hover{background:#185FA5}
.login-btn:disabled{background:var(--color-background-secondary);color:var(--color-text-tertiary);cursor:not-allowed}
.login-err{font-size:11px;color:#E24B4A;display:flex;align-items:center;gap:4px;min-height:16px;margin-bottom:4px}
.login-footer{font-size:11px;color:var(--color-text-tertiary);margin-top:14px;text-align:center}

/* ===== 主系統 ===== */
#app-screen{display:flex;min-height:100vh;width:100%}
.sidebar{width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar-header{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-logo{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.sidebar-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.sidebar-user{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:5px;color:var(--color-text-secondary)}
.nav-section{padding:10px 16px 3px;font-size:10px;color:var(--color-text-tertiary);letter-spacing:.05em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-left:2px solid transparent;user-select:none}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{color:#0c447c;border-left-color:#378ADD;background:var(--color-background-info)}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-arrow{margin-left:auto;font-size:13px;color:var(--color-text-tertiary);transition:transform .2s}
.nav-item.open .nav-arrow{transform:rotate(90deg)}
.nav-children{display:none;padding-left:16px;border-left:0.5px solid var(--color-border-tertiary);margin-left:28px}
.nav-item.open + .nav-children{display:block}
.nav-child{display:block;padding:7px 12px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border-left:2px solid transparent}
.nav-child:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
.nav-child.active{color:#0c447c;border-left-color:#378ADD;background:var(--color-background-info)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;color:#E24B4A;cursor:pointer;margin-top:auto;border-top:0.5px solid var(--color-border-tertiary)}
.logout-btn:hover{background:#FCEBEB}
.main{flex:1;padding:20px 28px;background:var(--color-background-tertiary);overflow-y:auto}

/* ===== 共用元件 ===== */
.page-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.page-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:18px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#378ADD;color:#fff;border-color:#378ADD}.btn-primary:hover{background:#185FA5}
.btn-warning{background:#E24B4A;color:#fff;border-color:#E24B4A}.btn-warning:hover{background:#A32D2D}
.btn-sm{padding:4px 9px;font-size:11px}
.tag{font-size:11px;padding:2px 7px;border-radius:var(--border-radius-md);border:0.5px solid;white-space:nowrap;display:inline-block}
.tag-duty{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.tag-notice{background:#FAEEDA;color:#633806;border-color:#FAC775}
.tag-reg{background:#e6f1fb;color:#0c447c;border-color:#b5d4f4}
.tag-revised{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.tag-unrevised{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.tag-na{background:var(--color-background-secondary);color:var(--color-text-secondary);border-color:var(--color-border-secondary)}
.badge{font-size:11px;padding:2px 7px;border-radius:var(--border-radius-md);font-weight:500;display:inline-block;white-space:nowrap}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-blue{background:#e6f1fb;color:#0c447c}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-s{background:#EEEDFE;color:#3C3489}
.badge-a{background:#e6f1fb;color:#0c447c}
.badge-b{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 12px;margin-bottom:14px}
.search-bar input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--color-text-primary);font-family:var(--font-sans)}
.search-bar input:focus{outline:none}
.search-bar i{color:var(--color-text-tertiary);font-size:15px}
.empty-state{text-align:center;padding:36px 20px;color:var(--color-text-secondary);font-size:13px}
select,input[type=text],input[type=date],textarea{font-family:var(--font-sans);font-size:12px;padding:6px 9px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
select:focus,input:focus,textarea:focus{outline:none;border-color:#378ADD}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:12px;padding:8px 16px;border-radius:var(--border-radius-lg);opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
.vtable{width:100%;border-collapse:collapse}
.vtable th{text-align:left;padding:7px 11px;font-size:11px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;background:var(--color-background-secondary)}
.vtable td{padding:8px 11px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);font-size:12px;vertical-align:middle}
.vtable tr:last-child td{border-bottom:none}
.item-row{display:flex;align-items:center;gap:12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 14px;margin-bottom:8px}
.item-row.warn{border-left:3px solid #EF9F27}
.item-row.danger{border-left:3px solid #E24B4A}
.item-row .countdown{font-size:13px;font-weight:500;padding:4px 10px;border-radius:var(--border-radius-md);font-variant-numeric:tabular-nums;min-width:56px;text-align:center}
.item-row .countdown.safe{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.item-row .countdown.warn{background:#FAEEDA;color:#633806}
.item-row .countdown.danger{background:#E24B4A;color:#fff}
.placeholder-page{color:var(--color-text-secondary);font-size:13px;padding:40px 0;text-align:center;border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg)}
</style>
</head>

function buildRegTree() {
  const c = document.getElementById('subnav-reg');
  if (!c) return;
  c.innerHTML = '';
  buildBranch(regulationTree, c, '');
}

function buildBranch(node, container, path) {
  for (const key in node) {
    const fullPath = path ? path + ' / ' + key : key;
    const children = node[key];
    if (children) {
      const wrap = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'nav-child';
      title.style.display = 'flex';
      title.style.justifyContent = 'space-between';
      title.style.alignItems = 'center';
      title.innerHTML = `<span>${key}</span><i class="ti ti-chevron-right" style="font-size:11px;color:var(--color-text-tertiary);transition:transform .2s"></i>`;
      const sub = document.createElement('div');
      sub.style.cssText = 'display:none;padding-left:12px;border-left:0.5px solid var(--color-border-tertiary);margin-left:12px';
      title.onclick = () => {
        const open = sub.style.display === 'block';
        sub.style.display = open ? 'none' : 'block';
        title.querySelector('i').style.transform = open ? '' : 'rotate(90deg)';
      };
      buildBranch(children, sub, fullPath);
      wrap.appendChild(title);
      wrap.appendChild(sub);
      container.appendChild(wrap);
      if (key === '運務處(OPD)') { sub.style.display = 'block'; title.querySelector('i').style.transform = 'rotate(90deg)'; }
    } else {
      const item = document.createElement('div');
      item.className = 'nav-child';
      item.textContent = key;
      item.onclick = () => goToPage('regulation-unit', item, fullPath);
      container.appendChild(item);
    }
  }
}

function toggleSubnav(id, el) {
  const sub = document.getElementById(id);
  if (!sub) return;
  const open = sub.style.display === 'block';
  sub.style.display = open ? 'none' : 'block';
  const arrow = el.querySelector('.nav-arrow');
  if (arrow) arrow.style.transform = open ? '' : 'rotate(90deg)';
}

function goToPage(key, el, param) {
  const fn = pages[key];
  document.getElementById('main-content').innerHTML = fn ? fn(param) : '<div class="placeholder-page">頁面開發中</div>';
  document.querySelectorAll('.nav-item,.nav-child').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

function toggleLoginEye() {
  const inp = document.getElementById('l-pwd'), icon = document.getElementById('eye-icon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'ti ti-eye-off'; }
  else { inp.type = 'password'; icon.className = 'ti ti-eye'; }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('l-acc').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('l-pwd').focus(); });
  document.getElementById('l-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBaYrnW9w8C4vpqRDH86HfL_zk3Rhaqgy0",
  authDomain: "tmrt-regulation-aae6f.firebaseapp.com",
  projectId: "tmrt-regulation-aae6f",
  storageBucket: "tmrt-regulation-aae6f.firebasestorage.app",
  messagingSenderId: "684290109416",
  appId: "1:684290109416:web:a3854d7ded1551e2f97e5d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
window._db = db;
window._storage = storage;

window.doLogin = async function() {
  const acc = document.getElementById('l-acc').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const errEl = document.getElementById('l-err');
  const btn = document.getElementById('login-btn');
  errEl.innerHTML = '';
  if (!acc || !pwd) { errEl.innerHTML = '<i class="ti ti-alert-circle"></i> 請輸入帳號與密碼'; return; }
  btn.textContent = '登入中…'; btn.disabled = true;
  const email = 'tcm' + acc + '@tmrt.com.tw';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    errEl.innerHTML = '<i class="ti ti-alert-circle"></i> 員工編號或密碼錯誤';
    btn.textContent = '登入'; btn.disabled = false;
  }
};

window.doLogout = async function() { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    const level = userDoc.exists() ? userDoc.data().level : 'B';
    window._userLevel = level;
    const displayId = user.email.replace('tcm','').replace('@tmrt.com.tw','');

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('user-id-display').textContent = displayId;

    const badge = document.getElementById('user-level-badge');
    badge.textContent = level + '級';
    badge.className = 'badge badge-' + level.toLowerCase();

    if (level === 'S') {
      document.getElementById('admin-section').style.display = '';
      document.getElementById('nav-admin').style.display = 'flex';
      document.getElementById('subnav-admin').style.display = '';
    }

    buildRegTree();
    goToPage('readme', document.getElementById('nav-readme'));
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-btn').textContent = '登入';
    document.getElementById('login-btn').disabled = false;
  }
});
</script>
