<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>規章查找系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--cp:#ffffff;--cs:#f5f5f4;--ct:#e8e8e6;--ci:#e6f1fb;--tp:#1a1a18;--ts:#6b6b67;--tt:#9e9e9a;--ti:#0c447c;--bt:#e0e0dc;--bs:#d0d0cc;--bi:#b5d4f4;--rm:6px;--rl:10px;--fs:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fs);background:var(--ct);display:flex;min-height:100vh;color:var(--tp)}
#login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--ct);padding:24px;width:100%}
.login-card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);width:360px;padding:32px 32px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.logo-area{text-align:center;margin-bottom:24px}
.logo-area img{height:52px;width:auto;display:block;margin:0 auto 10px}
.sys-name{font-size:16px;font-weight:500;color:var(--tp);margin-top:2px}
.sys-sub{font-size:11px;color:var(--ts);margin-top:3px}
.login-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}.login-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.login-label{font-size:12px;color:var(--ts);font-weight:500}
.input-wrap{position:relative}
.input-wrap input{font-family:var(--fs);font-size:13px;padding:8px 36px 8px 11px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);width:100%;transition:border-color .15s}
.input-wrap input:focus{outline:none;border-color:#378ADD}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tt);font-size:15px;padding:2px}
.login-btn{width:100%;padding:9px;font-size:13px;font-weight:500;background:#378ADD;color:#fff;border:none;border-radius:var(--rm);cursor:pointer;font-family:var(--fs);margin-top:4px}
.login-btn:hover{background:#185FA5}
.login-btn:disabled{background:var(--cs);color:var(--tt);cursor:not-allowed}
.login-err{font-size:11px;color:#E24B4A;display:flex;align-items:center;gap:4px;min-height:16px;margin-bottom:4px}
.login-footer{font-size:11px;color:var(--tt);margin-top:14px;text-align:center}
#app-screen{display:flex;min-height:100vh;width:100%}
.sidebar{width:220px;background:var(--cp);border-right:0.5px solid var(--bt);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sh{padding:14px 16px;border-bottom:0.5px solid var(--bt)}
.sl{font-size:13px;font-weight:500;color:var(--tp)}
.ss{font-size:11px;color:var(--ts);margin-top:2px}
.su{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:5px;color:var(--ts)}
.nsec{padding:10px 16px 3px;font-size:10px;color:var(--tt);letter-spacing:.05em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:var(--ts);cursor:pointer;border-left:2px solid transparent;user-select:none}
.ni:hover{background:var(--cs);color:var(--tp)}
.ni.active{color:var(--ti);border-left-color:#378ADD;background:var(--ci)}
.ni i{font-size:16px;flex-shrink:0}
.na{margin-left:auto;font-size:13px;color:var(--tt);transition:transform .2s}
.nc{display:none;padding-left:12px;border-left:0.5px solid var(--bt);margin-left:28px}
.nch{display:block;padding:7px 12px;font-size:12px;color:var(--ts);cursor:pointer;border-left:2px solid transparent}
.nch:hover{color:var(--tp);background:var(--cs)}
.nch.active{color:var(--ti);border-left-color:#378ADD;background:var(--ci)}
.lgout{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;color:#E24B4A;cursor:pointer;margin-top:auto;border-top:0.5px solid var(--bt)}
.lgout:hover{background:#FCEBEB}
.main{flex:1;padding:20px 28px;background:var(--ct);overflow-y:auto}
.ptitle{font-size:18px;font-weight:500;color:var(--tp);margin-bottom:2px}
.psub{font-size:12px;color:var(--ts);margin-bottom:18px}
.card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);cursor:pointer;font-family:var(--fs)}
.btn:hover{background:var(--cs)}
.btn-primary{background:#378ADD;color:#fff;border-color:#378ADD}.btn-primary:hover{background:#185FA5}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}.btn-danger:hover{background:#A32D2D}
.btn-sm{padding:4px 9px;font-size:11px}
.tag{font-size:11px;padding:2px 7px;border-radius:var(--rm);border:0.5px solid;white-space:nowrap;display:inline-block}
.tag-revised{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.tag-unrevised{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.badge{font-size:11px;padding:2px 7px;border-radius:var(--rm);font-weight:500;display:inline-block;white-space:nowrap}
.lv-s{background:#EEEDFE;color:#3C3489}.lv-a{background:#e6f1fb;color:#0c447c}.lv-b{background:var(--cs);color:var(--ts)}
.sb{display:flex;align-items:center;gap:8px;background:var(--cp);border:0.5px solid var(--bs);border-radius:var(--rm);padding:7px 12px;margin-bottom:14px}
.sb input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--tp);font-family:var(--fs)}
.sb i{color:var(--tt);font-size:15px}
.vtbl{width:100%;border-collapse:collapse}
.vtbl th{text-align:left;padding:7px 11px;font-size:11px;color:var(--ts);font-weight:500;border-bottom:0.5px solid var(--bt);white-space:nowrap;background:var(--cs)}
.vtbl td{padding:8px 11px;border-bottom:0.5px solid var(--bt);color:var(--tp);font-size:12px;vertical-align:middle}
.vtbl tr:last-child td{border-bottom:none}
.vtbl tr:hover td{background:var(--cs)}
.empty{text-align:center;padding:36px 20px;color:var(--ts);font-size:13px}
.pholder{color:var(--ts);font-size:13px;padding:40px 0;text-align:center;border:1px dashed var(--bs);border-radius:var(--rl)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl2{font-size:12px;color:var(--ts);font-weight:500;display:block;margin-bottom:4px}
input[type=text],input[type=date],select,textarea{font-family:var(--fs);font-size:12px;padding:7px 9px;border-radius:var(--rm);border:0.5px solid var(--bs);background:var(--cp);color:var(--tp);width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#378ADD}
textarea{resize:vertical;min-height:80px}
.info-box{background:var(--ci);border:0.5px solid var(--bi);border-radius:var(--rm);padding:10px 14px;font-size:12px;color:var(--ti);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.warn-box{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--rm);padding:10px 14px;font-size:12px;color:#633806;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--cp);border-radius:var(--rl);border:0.5px solid var(--bt);width:480px;max-height:86vh;overflow-y:auto}
.modal-hdr{padding:14px 18px;border-bottom:0.5px solid var(--bt);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:500}
.modal-body{padding:16px 18px}
.modal-ftr{padding:12px 18px;border-top:0.5px solid var(--bt);display:flex;justify-content:flex-end;gap:8px}
.perm-tbl{width:100%;border-collapse:collapse;font-size:12px}
.perm-tbl th{padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--bt);color:var(--ts);font-weight:500;background:var(--cs)}
.perm-tbl td{padding:8px 12px;border-bottom:0.5px solid var(--bt)}
.perm-tbl tr:last-child td{border-bottom:none}
.pck{color:#1D9E75;font-size:16px}.pcx{color:#E24B4A;font-size:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:12px;padding:8px 16px;border-radius:var(--rl);opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;white-space:nowrap}
.tabs{display:flex;border-bottom:0.5px solid var(--bt);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab:hover{color:var(--tp)}.tab.active{color:#378ADD;border-bottom-color:#378ADD}
.tabpane{display:none}.tabpane.active{display:block}
.upload-zone{border:1.5px dashed var(--bs);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;background:var(--cs);transition:border-color .15s,background .15s}
.upload-zone:hover{border-color:#378ADD;background:#f0f6fd}
.upload-zone.drag-over{border-color:#378ADD;background:#e6f1fb;border-style:solid}
.upload-zone i{font-size:28px;color:var(--tt);display:block;margin-bottom:8px}
.upload-zone span{font-size:12px;color:var(--ts)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;padding:5px 12px;border-radius:14px;border:1.5px solid transparent;cursor:pointer;user-select:none;white-space:nowrap;font-weight:500;transition:opacity .1s}
.chip:hover{opacity:.8}
.chip.active{border-color:currentColor}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:var(--rm);font-weight:500;display:inline-block;white-space:nowrap}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filter-select{width:auto;min-width:160px}
.list-card{background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--bs)}
.list-card.expired{background:#f8f9fa;border-left-color:#adb5bd}
.kw-hl{background:#fff3a0;color:#1a1a18;padding:0 1px;border-radius:2px;font-weight:600}
.kw-hl-active{background:#ff9f43!important;color:#fff!important;outline:2px solid #e0710a}
.upload-progress{height:4px;background:var(--cs);border-radius:2px;margin-top:10px;overflow:hidden;display:none}
.upload-progress-bar{height:100%;background:#378ADD;border-radius:2px;width:0%;transition:width .3s}
.btn-success-temp{background:#1D9E75!important;border-color:#1D9E75!important}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--cp);border:0.5px solid var(--bt);border-radius:var(--rm);font-size:12px}
.file-item i{font-size:15px;color:var(--tt)}.file-item span{flex:1}
.file-item button{background:none;border:none;cursor:pointer;color:var(--tt);font-size:13px;padding:2px}
.file-item button:hover{color:#E24B4A}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ===== 手機版 RWD（螢幕寬度 <=768px） ===== */
.mobile-topbar{display:none}
.sidebar-overlay{display:none}
@media (max-width:768px){
  body{display:block}
  #login-screen{padding:16px}
  .login-card{width:100%;max-width:360px;padding:28px 22px 24px}

  .mobile-topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:120;background:var(--cp);border-bottom:0.5px solid var(--bt);padding:10px 14px;height:52px}
  .mobile-topbar .mt-burger{background:none;border:none;font-size:22px;color:var(--tp);cursor:pointer;padding:6px;line-height:1;flex-shrink:0}
  .mobile-topbar .mt-title{font-size:14px;font-weight:500;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  #app-screen{display:block}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:80vw;max-width:280px;z-index:250;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 16px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:240}
  .main{width:100%;padding:14px 12px 28px}

  .ptitle{font-size:16px}
  .card{padding:12px 12px}
  /* 表格外層允許橫向捲動，避免整頁被撐開；覆蓋原本inline寫死的 overflow:hidden */
  .card{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
  .vtbl{min-width:640px}
  .vtbl th,.vtbl td{padding:9px 10px;font-size:12px}
  .vtbl td[style*="display:flex"]{min-width:220px}

  /* 觸控按鈕加大，避免誤觸 */
  .btn{padding:8px 13px;font-size:12.5px;min-height:34px}
  .btn-sm{padding:7px 11px;font-size:11.5px;min-height:30px}
  .ni,.nch{padding-top:11px;padding-bottom:11px}

  .modal{width:calc(100vw - 24px);max-width:480px;max-height:88vh}
  .modal-hdr{padding:12px 14px}
  .modal-body{padding:14px}
  .modal-ftr{padding:10px 14px;flex-wrap:wrap}

  .fg2{grid-template-columns:1fr}

  /* 搜尋框＋排序選單這類橫排區塊，手機版改直排 */
  div[style*="display:flex"][style*="min-width:200px"]{flex-direction:column;align-items:stretch!important}
  .sb{margin-bottom:8px}

  .filter-row{gap:8px}
  .info-box,.warn-box{padding:9px 11px;font-size:11.5px}
}
</style>

<script>
function toggleMobileSidebar(forceState){
  const sb=document.querySelector('.sidebar');
  const ov=document.querySelector('.sidebar-overlay');
  if(!sb||!ov)return;
  const willOpen = typeof forceState==='boolean' ? forceState : !sb.classList.contains('open');
  sb.classList.toggle('open', willOpen);
  ov.classList.toggle('open', willOpen);
}
</script>
</head>

function buildRegTree(){const c=document.getElementById('sub-reg');if(!c)return;c.innerHTML='';buildBranch(regTree,c,'','reg-unit');}
function buildFormTree(){const c=document.getElementById('sub-form');if(!c)return;c.innerHTML='';buildBranch(regTree,c,'','form-unit');}
function flattenTreeLeaves(node){let out=[];for(const key in node){const ch=node[key];if(ch)out=out.concat(flattenTreeLeaves(ch));else out.push(key);}return out;}
const SEARCH_EXTRA_UNITS=['運務處','行控中心','站務中心','票務中心','維修處','工安處','北段辦','南段辦'];
function searchDeptOptions(){
  const leaves=[];
  flattenTreeLeaves(regTree).forEach(u=>{ if(!leaves.includes(u)) leaves.push(u); });
  return [...leaves, ...SEARCH_EXTRA_UNITS];
}
function deptSelectHtml(id,current){
  const leaves=[];
  flattenTreeLeaves(regTree).forEach(u=>{ if(!leaves.includes(u)) leaves.push(u); });
  const isOrphan = current && !leaves.includes(current);
  return `<select id="${id}">
    <option value="">請選擇所屬處室</option>
    ${isOrphan?`<option value="${escapeHtml(current)}" selected>${escapeHtml(current)}（⚠ 找不到對應資料夾，建議改選其他分類）</option>`:''}
    ${leaves.map(u=>`<option value="${escapeHtml(u)}" ${u===current?'selected':''}>${escapeHtml(u)}</option>`).join('')}
  </select>`;
}
function resolveTreeNode(path){
  if(!path)return regTree;
  const parts=path.split(' / ');
  let node=regTree;
  for(const p of parts){
    if(node && typeof node==='object' && Object.prototype.hasOwnProperty.call(node,p)){
      node=node[p];
    }else{
      return undefined;
    }
  }
  return node;
}
function deptsForPath(path){
  if(!path)return flattenTreeLeaves(regTree);
  const parts=path.split(' / ');
  const lastKey=parts[parts.length-1];
  const node=resolveTreeNode(path);
  if(node && typeof node==='object'){
    return flattenTreeLeaves(node);
  }
  return [lastKey];
}
function buildBranch(node,container,path,pageKey){pageKey=pageKey||'reg-unit';for(const key in node){const fp=path?path+' / '+key:key;const ch=node[key];if(ch){const w=document.createElement('div');const t=document.createElement('div');t.className='nch';t.style.cssText='display:flex;justify-content:space-between;align-items:center';const label=document.createElement('span');label.textContent=key;label.style.cssText='flex:1;cursor:pointer';const ic=document.createElement('i');ic.className='ti ti-chevron-right';ic.style.cssText='font-size:11px;color:var(--tt);transition:transform .2s;cursor:pointer;padding:2px 6px';const s=document.createElement('div');s.style.cssText='display:none;padding-left:10px;border-left:0.5px solid var(--bt);margin-left:10px';const toggle=()=>{const o=s.style.display==='block';s.style.display=o?'none':'block';ic.style.transform=o?'':'rotate(90deg)'};ic.onclick=(e)=>{e.stopPropagation();toggle();};label.onclick=()=>{gp(pageKey,t,fp);if(s.style.display!=='block')toggle();};t.appendChild(label);t.appendChild(ic);buildBranch(ch,s,fp,pageKey);w.appendChild(t);w.appendChild(s);container.appendChild(w);if(key==='運務處(OPD)'){s.style.display='block';ic.style.transform='rotate(90deg)'}}else{const it=document.createElement('div');it.className='nch';it.textContent=key;it.onclick=()=>gp(pageKey,it,fp);container.appendChild(it)}}}

function toggleSub(id,el){const s=document.getElementById(id);if(!s)return;const o=s.style.display==='block';s.style.display=o?'none':'block';const a=el.querySelector('.na');if(a)a.style.transform=o?'':'rotate(90deg)'}

function gp(key,el,param){
  document.querySelectorAll('.ni,.nch').forEach(n=>n.classList.remove('active'));

  try{ sessionStorage.setItem('lastRoute', JSON.stringify({key, param: param||null})); }catch(e){}
  if(window.innerWidth<=768) toggleMobileSidebar(false);
  const r=document.getElementById('main');
  const map={
    readme:pageReadme,search:pageSearch,
    duty:pageDuty,notice:pageNotice,
    'reg-unit':()=>pageRegUnit(param),
    'form-unit':()=>pageFormUnit(param),
    'admin-upload-duty':pageUploadDuty,'admin-upload-notice':pageUploadNotice,
    'admin-upload-reg':pageUploadReg,'admin-upload-form':pageUploadForm,'admin-revise':pageRevise,'admin-eip':pageEipCompare,'admin-orphan':pageOrphanCheck,'admin-backfill':pageBackfillText,'admin-perm':pagePerm,'admin-pdf-test':pagePdfTest,'admin-log':pageActivityLog
  };
  r.innerHTML=(map[key]||(()=>'<div class="pholder">頁面開發中</div>'))();
  if(key==='admin-perm') initPermPage();
  if(key==='admin-log') setTimeout(()=>loadActivityLog(true), 0);
  if(key==='admin-orphan') setTimeout(loadOrphanCheck, 0);

  if(key==='admin-pdf-test') initDropZone('pdftest-drop-zone','pdftest-fs',null);
  if(key==='admin-upload-duty') { initDropZone('duty-drop-zone','dfs','dfl'); }
  if(key==='admin-upload-notice') initDropZone('notice-drop-zone','nfs','nfl');
}

let _searchDebounce=null;
function doSearch(q){
  const r=document.getElementById('sr');
  if(!r)return;
  if(!q.trim()){r.innerHTML='<div class="empty">請輸入關鍵字</div>';return;}
  clearTimeout(_searchDebounce);
  _searchDebounce=setTimeout(()=>runSearch(q.trim()),300);
}

function splitKeywords(kw){
  return (kw==null?'':String(kw)).trim().split(/\s+/).filter(Boolean);
}
function matchesAllKeywords(fields, kw){
  const kws=splitKeywords(kw);
  if(!kws.length) return true;
  const blob=fields.filter(f=>f!=null&&f!=='').join(' \u0000 ').toLowerCase();
  return kws.every(k=>blob.includes(k.toLowerCase()));
}
function snippetOf(text,kw){
  text=text||'';
  const kws=splitKeywords(kw);
  if(!kws.length) return text.slice(0,80);
  const tl=text.toLowerCase();
  let idx=-1, hitLen=kws[0].length;
  for(const k of kws){ const i=tl.indexOf(k.toLowerCase()); if(i>=0 && (idx<0||i<idx)){idx=i;hitLen=k.length;} }
  if(idx<0)return text.slice(0,80);
  const start=Math.max(0,idx-30);
  const end=Math.min(text.length,idx+hitLen+50);
  return (start>0?'…':'')+text.slice(start,end)+(end<text.length?'…':'');
}
function countMatches(text,kw){
  if(!text||!kw)return 0;
  const kws=splitKeywords(kw);
  let total=0;
  kws.forEach(k=>{
    const re=new RegExp(escapeRegex(k),'gi');
    const m=text.match(re);
    total+=m?m.length:0;
  });
  return total;
}

async function runSearch(kw){
  const r=document.getElementById('sr');
  if(!r)return;
  r.innerHTML='<div class="empty">搜尋中…</div>';
  try{
    const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const kwLower=kw.toLowerCase();
    const matchText=(fields)=>matchesAllKeywords(fields,kw);
    const wantDuty=document.getElementById('sf-duty')?.checked!==false;
    const wantNotice=document.getElementById('sf-notice')?.checked!==false;
    const wantReg=document.getElementById('sf-reg')?.checked!==false;
    const wantForm=document.getElementById('sf-form')?.checked!==false;
    const deptFilter=document.getElementById('sf-dept')?.value||'';
    const [dutySnap, noticeSnap, regSnap, formSnap] = await Promise.all([
      wantDuty?getDocs(query(collection(window._db,'duty_briefs'), where('status','==','active'))):Promise.resolve({forEach:()=>{}}),
      wantNotice?getDocs(query(collection(window._db,'notices'), where('status','==','active'))):Promise.resolve({forEach:()=>{}}),
      wantReg?getDocs(query(collection(window._db,'regulations'), where('status','==','active'))):Promise.resolve({forEach:()=>{}}),
      wantForm?getDocs(query(collection(window._db,'forms'), where('status','==','active'))):Promise.resolve({forEach:()=>{}})
    ]);
    let dutyMatches=[]; dutySnap.forEach(doc=>{const d=doc.data(); if((!deptFilter||d.unit===deptFilter)&&matchText([d.title,d.content])) dutyMatches.push({id:doc.id,...d});});
    let noticeMatches=[]; noticeSnap.forEach(doc=>{const d=doc.data(); if((!deptFilter||d.unit===deptFilter)&&matchText([d.title,d.content])) noticeMatches.push({id:doc.id,...d});});
    let regMatches=[]; regSnap.forEach(doc=>{const d=doc.data(); if((!deptFilter||d.dept===deptFilter)&&matchText([d.title,d.docNo,d.fullText])) regMatches.push({id:doc.id,...d});});
    let formMatches=[]; formSnap.forEach(doc=>{const d=doc.data(); if((!deptFilter||d.dept===deptFilter)&&matchText([d.title,d.formNo,d.fullText])) formMatches.push({id:doc.id,...d});});
    // 排序：標題比對到的排最前面，其餘依內文比對排後面；同組再依日期新到舊排序
    const sortByRelevance=(arr,dateField)=>{
      arr.sort((a,b)=>{
        const aTitleHit=matchesAllKeywords([a.title],kw)?0:1;
        const bTitleHit=matchesAllKeywords([b.title],kw)?0:1;
        if(aTitleHit!==bTitleHit)return aTitleHit-bTitleHit;
        const ad=a[dateField]||'', bd=b[dateField]||'';
        return bd.localeCompare(ad);
      });
      return arr;
    };
    sortByRelevance(dutyMatches,'issuedDate');
    sortByRelevance(noticeMatches,'issuedDate');
    sortByRelevance(regMatches,'approvedDate');
    sortByRelevance(formMatches,'approvedDate');
    const total=dutyMatches.length+noticeMatches.length+regMatches.length+formMatches.length;
    if(total===0){r.innerHTML=`<div class="empty">找不到包含「${escapeHtml(kw)}」的資料</div>`;return;}
    const section=(label,items,kind)=>{
      if(items.length===0)return '';
      return `<div style="margin-bottom:18px">
        <div style="font-size:13px;font-weight:600;color:var(--ts);margin-bottom:8px">${label}（${items.length}）</div>
        ${items.map(d=>renderSearchItem(d,kind,kw)).join('')}
      </div>`;
    };
    r.innerHTML = `<div class="info-box" style="margin-bottom:14px"><i class="ti ti-info-circle"></i>共找到 ${total} 筆包含「${escapeHtml(kw)}」的資料${deptFilter?`（處室／單位：${escapeHtml(deptFilter)}）`:''}</div>`
      + section('勤前指示',dutyMatches,'duty')
      + section('通告',noticeMatches,'notice')
      + section('規章',regMatches,'regulation')
      + section('表單',formMatches,'form');
  }catch(e){
    r.innerHTML=`<div class="empty">搜尋失敗：${e.message}</div>`;
  }
}

function escapeHtml(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isValidDate(s){return !!(s && /^\d{4}-\d{2}-\d{2}$/.test(s));}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightText(text,kw){
  const escaped=escapeHtml(text);
  const kws=splitKeywords(kw);
  if(!kws.length)return escaped;

  kws.forEach(k=>{
    const re=new RegExp(escapeRegex(escapeHtml(k)),'gi');
    result=result.replace(re,m=>`<mark class="kw-hl">${m}</mark>`);
  });
  return result;
}

function computeLastUpdated(docs){
  let maxMs=0;
  (docs||[]).forEach(d=>{
    const c=d.updatedAt||d.createdAt;
    if(c&&typeof c.toDate==='function'){
      const ms=c.toDate().getTime();
      if(ms>maxMs)maxMs=ms;
    }
  });
  return maxMs?new Date(maxMs):null;
}
function formatLastUpdated(date){
  if(!date)return '';
  const pad=n=>String(n).padStart(2,'0');
  return `最後更新：${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function lastUpdatedLine(d){
  if(!d.updatedAt)return '';

  const pad=n=>String(n).padStart(2,'0');

}

        where('status', '==', 'active')
      );
      snap = await getDocs(q);
    } else {
      const q = query(collection(window._db, 'regulations'), where('status', '==', 'active'));

    renderRegList();

    area.innerHTML = `<div class="pholder">載入失敗：${e.message}</div>`;
  }

function sortDocs(list, sortVal, numFieldMap){
  const [field, dir] = (sortVal||'docNo-asc').split('-');
  const mul = dir==='desc' ? -1 : 1;
  const isNum = numFieldMap && numFieldMap.includes(field);
  return [...list].sort((a,b)=>{
    let av=a[field], bv=b[field];
    if(field==='version'){ av=parseFloat(av)||0; bv=parseFloat(bv)||0; return (av-bv)*mul; }
    av=(av||''); bv=(bv||'');
    return String(av).localeCompare(String(bv), 'zh-Hant', {numeric:true})*mul;
  });
}

  let list = window._formListDocs.filter(d => matchesAllKeywords([d.title,d.formNo,d.fullText],kw));
  if (window._formListDocs.length === 0) { area.innerHTML = '<div class="pholder">此範圍尚無表單資料</div>'; return; }
  if (list.length === 0) { area.innerHTML = '<div class="pholder">找不到符合的表單</div>'; return; }
  const sortVal = document.getElementById('form-sort')?.value || 'formNo-asc';
  list = sortDocs(list, sortVal);
  const showDept = !!window._formListMulti;
  const rows = list.map(d => {
    const titleHit=matchesAllKeywords([d.title],kw);
    const contentSnippet=(kw&&!titleHit&&d.fullText)?`<div style="font-size:11px;color:var(--ts);margin-top:4px">${highlightText(snippetOf(d.fullText,kw),kw)}</div>`:'';
    return `<tr>
    <td><strong>${highlightText(d.formNo||'—',kw)}</strong></td>
    <td>${highlightText(d.title||'—',kw)}${lastUpdatedLine(d)}${contentSnippet}</td>
    ${showDept?`<td style="font-size:11px;color:var(--ts)">${escapeHtml(d.dept||'—')}</td>`:''}
    <td>${d.version?('版次 '+escapeHtml(d.version)):'—'}</td>
    <td>${d.approvedDate||'—'}</td>
    <td style="display:flex;gap:6px;flex-wrap:wrap">
      ${d.fileUrl ? `<button class="btn btn-sm" onclick='showFullText(${JSON.stringify(d.title||"")}, ${JSON.stringify(d.fullText||"")}, ${JSON.stringify(d.fileUrl||"")}, ${JSON.stringify(d.fileName||"")}, "forms", ${JSON.stringify(d.id||"")}, ${JSON.stringify(kw)})'><i class="ti ti-file-text"></i> 查閱全文</button>` : ''}
      ${(d.fileUrl&&(window._level==='S'||window._level==='A')) ? `<a href="${d.fileUrl}" download="${d.fileName||''}" class="btn btn-sm"><i class="ti ti-download"></i> 下載</a>` : ''}
      ${d.formNo ? `<button class="btn btn-sm" onclick="showVersionHistory('forms','formNo','${d.formNo}','${escapeHtml(d.title||d.formNo)}')"><i class="ti ti-history"></i> 歷史版本</button>` : ''}
      ${(window._level==='S'||window._level==='A')?`<button class="btn btn-sm" onclick='openEdit("form",${JSON.stringify(d.id)})'><i class="ti ti-edit"></i> 編輯</button>`:''}
      ${window._level==='S'?`<button class="btn btn-sm" style="color:#E24B4A" onclick='deleteFormItem(${JSON.stringify(d.id)},${JSON.stringify(d.title||"")})'><i class="ti ti-trash"></i> 刪除</button>`:''}
    </td>
  </tr>`;
  }).join('');
  area.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
    <table class="vtbl">
      <thead><tr><th>表單編號</th><th>表單名稱</th>${showDept?'<th>所屬處室</th>':''}<th>版次</th><th>核決日期</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

<div id="revise-result"><div class="pholder">輸入關鍵字後點擊比對，相關條文將列於此處</div></div>`;}

function findNearestHeading(text, pos){
  const chapterRe = /第[〇零一二三四五六七八九十百千萬0-9]+章/g;
  const sectionRe = /第[〇零一二三四五六七八九十百千萬0-9]+節/g;
  let chapter='', section='', m;
  while((m=chapterRe.exec(text))){ if(m.index<pos) chapter=m[0]; else break; }
  while((m=sectionRe.exec(text))){ if(m.index<pos) section=m[0]; else break; }
  return chapter+section;
}
async function doReviseSearch(){
  const kw = document.getElementById('revise-kw')?.value?.trim();
  const area = document.getElementById('revise-result');
  if (!area) return;
  if (!kw) { area.innerHTML = '<div class="pholder">請輸入關鍵字</div>'; return; }
  area.innerHTML = '<div class="pholder">搜尋中…</div>';
  try {
    const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const q = query(collection(window._db, 'regulations'), where('status','==','active'));
    const snap = await getDocs(q);
    const kws = splitKeywords(kw);
    const matches = [];
    snap.forEach(doc => {
      const d = doc.data();
      const text = d.fullText || '';
      const textLower = text.toLowerCase();
      if (!matchesAllKeywords([d.title, text], kw)) return;
      const titleHit = matchesAllKeywords([d.title], kw);
      const snippets = [];
      kws.forEach(k=>{
        const kLower = k.toLowerCase();
        let searchFrom = 0, countForThisKw = 0;
        while (snippets.length < 5 && countForThisKw < 3) {
          const found = textLower.indexOf(kLower, searchFrom);
          if (found < 0) break;
          const heading = findNearestHeading(text, found);
          const start = Math.max(0, found - 30);
          const end = Math.min(text.length, found + k.length + 30);
          const body = (start>0?'…':'') + text.slice(start, end) + (end<text.length?'…':'');
          snippets.push(heading ? `<span style="color:var(--ti);font-weight:600">［${escapeHtml(heading)}］</span>${body}` : body);
          searchFrom = found + k.length;
          countForThisKw++;
        }
      });
      if (titleHit || snippets.length > 0) {
        matches.push({id:doc.id, docNo:d.docNo, title:d.title, dept:d.dept, version:d.version, fileUrl:d.fileUrl, fileName:d.fileName, fullText:text, hitCount:countMatches(text,kw), snippets});
      }
    });
    if (matches.length === 0) { area.innerHTML = `<div class="pholder">沒有找到包含「${escapeHtml(kw)}」的規章</div>`; return; }
    matches.sort((a,b) => b.hitCount - a.hitCount);
    window._reviseMatches = matches;
    window._reviseKw = kw;
    area.innerHTML = `<div class="info-box" style="margin-bottom:10px"><i class="ti ti-info-circle"></i>共找到 ${matches.length} 份規章包含「${escapeHtml(kw)}」；片段前［　］內為系統偵測到最接近的章節標記（規則比對，僅供參考，仍建議點開全文核對）</div>` + matches.map((m,i) => `<div class="list-card" style="border-left-color:var(--ti)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">

function parseEipItems(text){
  const re = /(TMRT(?:-[A-Za-z]+|-\d+)+)([^\n(（]+?)[\(（](\d+)\s*版[\)）]/g;
  const items = [];
  let m;
  while((m = re.exec(text))){
    items.push({docNo: m[1].trim(), name: m[2].trim(), version: parseInt(m[3], 10)});
  }
  return items;
}

async function doEipCompare(){
  const text = document.getElementById('eip-text')?.value || '';
  const area = document.getElementById('eip-result');
  if (!area) return;
  const items = parseEipItems(text);
  if (items.length === 0) { area.innerHTML = '<div class="pholder">沒有偵測到任何「文件編號＋名稱＋(N版)」格式的項目，請確認貼上的內容格式</div>'; return; }
  area.innerHTML = '<div class="pholder">比對中…</div>';
  try {
    const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const [regSnap, formSnap] = await Promise.all([
      getDocs(query(collection(window._db, 'regulations'), where('status','==','active'))),
      getDocs(query(collection(window._db, 'forms'), where('status','==','active')))
    ]);
    const regMap = {}, formMap = {};
    regSnap.forEach(doc => { const d = doc.data(); if (d.docNo) regMap[d.docNo] = {id: doc.id, ...d}; });
    formSnap.forEach(doc => { const d = doc.data(); if (d.formNo) formMap[d.formNo] = {id: doc.id, ...d}; });
    const results = items.map(item => {
      const reg = regMap[item.docNo];
      const form = formMap[item.docNo];
      const existing = reg || form;
      const kind = reg ? 'regulation' : (form ? 'form' : null);
      const dbVersion = existing ? parseInt(existing.version, 10) : null;
      let status;
      if (!existing) status = 'missing';
      else if (dbVersion !== item.version) status = 'outdated';
      else status = 'ok';
      return {...item, kind, docId: existing?existing.id:null, dbVersion: existing?existing.version:null, status};
    }).filter(r => r.status !== 'ok');
    window._eipResults = results;
    window._eipTotalScanned = items.length;
    renderEipResults(items.length);
  } catch(e) {
    area.innerHTML = `<div class="pholder">比對失敗：${e.message}</div>`;
  }
}

async function scanBackfillCandidates(){
  const area = document.getElementById('backfill-result');
  if (!area) return;
  try {
    const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

      if (d.fileUrl && d.fileName && isExtractableFile(d.fileName)) extractable.push(item); else skipped.push(item);
    });
    formSnap.forEach(doc => {

      if (d.fullText && d.fullText.trim()) return;
      const item = {id:doc.id, kind:'form', collectionName:'forms', label:'表單', docNo:d.formNo, title:d.title, fileUrl:d.fileUrl, fileName:d.fileName};
      if (d.fileUrl && d.fileName && isExtractableFile(d.fileName)) extractable.push(item); else skipped.push(item);
    });
    window._backfillCandidates = extractable;

    const skippedNote = skipped.length ? `<div style="margin-top:8px;font-size:12px;color:var(--ts)">另有 ${skipped.length} 筆無法自動擷取（舊版.doc格式、或找不到原始檔案），需個別確認：${skipped.map(s=>escapeHtml(s.title||s.docNo||'—')).join('、')}</div>` : '';
    area.innerHTML = `<div class="info-box"><i class="ti ti-info-circle"></i>掃描到 ${extractable.length} 筆規章/表單尚未擷取全文，可一次批次補齊${skippedNote}</div>
      <button class="btn btn-primary" style="margin-top:10px" onclick="runBackfillExtract()"><i class="ti ti-refresh"></i> 開始批次擷取 ${extractable.length} 份</button>
      <div id="backfill-progress" style="margin-top:14px"></div>`;
  } catch(e) {
    area.innerHTML = `<div class="pholder">掃描失敗：${e.message}</div>`;
  }

async function runBackfillExtract(){
  const list = window._backfillCandidates || [];
  const progress = document.getElementById('backfill-progress');
  const btn = document.querySelector('#backfill-result .btn-primary');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  let ok = 0, fail = 0, done = 0;
  const failItems = [];
  const CONCURRENCY = 6; // 同時平行處理筆數，兼顧速度與瀏覽器/網路負擔
  const updateProgress = () => {
    if (progress) progress.innerHTML = `<div class="pholder">正在批次處理…(${done}/${list.length}　成功 ${ok}　失敗／空白 ${fail})</div>`;
  };
  updateProgress();
  try {
    const {doc, updateDoc, serverTimestamp} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    let nextIndex = 0;
    async function worker(){
      while (nextIndex < list.length) {
        const i = nextIndex++;
        const item = list[i];
        try {
          const res = await fetch(item.fileUrl);
          if (!res.ok) throw new Error('無法下載原始檔案');
          const blob = await res.blob();
          const fileForExtract = new File([blob], item.fileName, {type: blob.type});
          const {text} = await extractFileText(fileForExtract, 500);
          await updateDoc(doc(window._db, item.collectionName, item.id), {fullText: text||'', fullTextUpdatedAt: serverTimestamp()});
          if (text && text.trim()) ok++; else { fail++; failItems.push({...item, reason:'擷取結果為空（可能是掃描件或空白內容）'}); }
        } catch(e) {
          fail++;
          failItems.push({...item, reason: e.message});
        }
        done++;
        updateProgress();
      }
    }
    const workers = Array.from({length: Math.min(CONCURRENCY, list.length)}, () => worker());
    await Promise.all(workers);
  } catch(e) {
    if (progress) progress.innerHTML = `<div class="pholder">批次擷取中斷：${e.message}</div>`;
    return;
  }
  if (progress) {
    progress.innerHTML = `<div class="info-box"><i class="ti ti-circle-check"></i>批次擷取完成：成功 ${ok} 份，失敗／空白 ${fail} 份</div>` +
      (failItems.length ? failItems.map(f => `<div class="list-card" style="border-left-color:#856404">
        <div style="font-size:13px;font-weight:600">${escapeHtml(f.label)}｜${escapeHtml(f.title||f.docNo||'—')}</div>
        <div style="font-size:12px;color:var(--ts);margin-top:4px">原因：${escapeHtml(f.reason)}</div>
      </div>`).join('') : '');
  }
}

  const csvUrl=gidMatch
    ? `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gidMatch[1]}`
    : `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv${sheetName?('&sheet='+encodeURIComponent(sheetName)):''}`;
  area.innerHTML='<div class="pholder">連線中…</div>';
  try{
    const res=await fetch(csvUrl);
    if(!res.ok) throw new Error('無法讀取試算表，請確認已設為「知道連結的人可以檢視」');
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2){area.innerHTML='<div class="pholder">試算表無資料</div>';return;}
    const headers=rows[0].map(h=>(h||'').trim());
    const idx=(aliases)=>headers.findIndex(h=>aliases.some(a=>h.includes(a)));
    const iId=idx(['員工編號','工號']);
    const iName=idx(['姓名']);
    const iLevel=idx(['權限等級','等級','級']);
    const iPwd=idx(['密碼']);
    if(iId<0||iName<0){area.innerHTML='<div class="pholder">找不到「員工編號」或「姓名」欄位，請確認試算表標題列</div>';return;}
    const {collection,getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDocs(collection(window._db,'users'));
    const existIds=new Set();
    snap.forEach(doc=>{const d=doc.data();if(d.id)existIds.add(String(d.id));});
    const parsed=[];
    for(let r=1;r<rows.length;r++){
      const row=rows[r];
      if(!row||row.every(c=>!c||!c.trim()))continue;
      const empId=((iId>=0?row[iId]:'')||'').trim();
      const name=((iName>=0?row[iName]:'')||'').trim();
      let level=((iLevel>=0?row[iLevel]:'')||'').trim().toUpperCase();
      if(!['S','A','B'].includes(level))level='B';
      const pwd=((iPwd>=0?row[iPwd]:'')||'').trim();
      if(!empId)continue;
      parsed.push({empId,name,level,pwd,_dup:existIds.has(empId),_invalidPwd:!pwd||pwd.length<6});
    }
    if(parsed.length===0){area.innerHTML='<div class="pholder">試算表無有效資料列</div>';return;}
    window._accBatchRows=parsed;
    const dupCount=parsed.filter(p=>p._dup).length;
    const invalidCount=parsed.filter(p=>!p._dup&&p._invalidPwd).length;
    const importable=parsed.filter(p=>!p._dup&&!p._invalidPwd);
    area.innerHTML=`
      <div class="info-box"><i class="ti ti-info-circle"></i>共讀取 ${parsed.length} 筆，其中 ${dupCount} 筆員工編號已存在（略過），${invalidCount} 筆缺密碼或密碼不足6碼（略過），${importable.length} 筆可匯入</div>
      ${importable.length?`<div class="card" style="padding:0;overflow:hidden;max-height:360px;overflow-y:auto">
        <table class="vtbl"><thead><tr><th>員工編號</th><th>姓名</th><th>權限等級</th><th>密碼</th></tr></thead>
        <tbody>${parsed.map(p=>`<tr style="${p._dup||p._invalidPwd?'opacity:.4':''}"><td>${escapeHtml(p.empId)}${p._dup?' <span style="color:#856404">(已存在)</span>':''}${p._invalidPwd&&!p._dup?' <span style="color:#E24B4A">(密碼不足)</span>':''}</td><td>${escapeHtml(p.name)}</td><td><span class="badge lv-${p.level.toLowerCase()}">${p.level} 級</span></td><td>${p._dup||p._invalidPwd?'—':'••••••'}</td></tr>`).join('')}</tbody>
        </table></div>
        <button class="btn btn-primary" style="margin-top:10px" onclick="confirmAccountBatchImport()"><i class="ti ti-check"></i> 確認匯入 ${importable.length} 個帳號</button>`
      :'<div class="pholder">沒有可匯入的新帳號</div>'}
    `;
  }catch(e){
    area.innerHTML=`<div class="pholder">連線失敗：${e.message}</div>`;
  }
}

async function confirmAccountBatchImport(){
  const rows=(window._accBatchRows||[]).filter(p=>!p._dup&&!p._invalidPwd);
  if(rows.length===0)return;
  const area=document.getElementById('acc-batch-preview');
  const btn=area.querySelector('.btn-primary');
  setBtnLoading(btn,`建立中…(0/${rows.length})`);
  let ok=0, fail=0;
  try{
    const {initializeApp,deleteApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getAuth,createUserWithEmailAndPassword}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const {doc,setDoc,serverTimestamp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const secondaryApp=initializeApp(window._fbConfig,'secondary-batch-'+Date.now());
    const secondaryAuth=getAuth(secondaryApp);
    try{
      for(let i=0;i<rows.length;i++){
        const p=rows[i];
        try{
          const email='tcm'+p.empId+'@tmrt.com.tw';
          const cred=await createUserWithEmailAndPassword(secondaryAuth,email,p.pwd);
          await setDoc(doc(window._db,'users',cred.user.uid),{id:p.empId,name:p.name,level:p.level,email,createdAt:serverTimestamp()});
          ok++;
        }catch(e){ fail++; }
        if(btn) btn.innerHTML=`<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> 建立中…(${i+1}/${rows.length})`;
      }
    }finally{
      await deleteApp(secondaryApp);
    }
    setBtnSuccess(btn,'已完成');
    await logActivity('user','batch_create','',`批次匯入 ${ok} 個帳號`,fail?`${fail}筆失敗`:'');
    showToast(`已建立 ${ok} 個帳號${fail?`，${fail} 個失敗`:''}`);
    area.innerHTML=`<div class="info-box"><i class="ti ti-info-circle"></i>批次匯入完成：成功 ${ok} 個${fail?`，失敗 ${fail} 個（可能是員工編號格式不合法或其他錯誤）`:''}</div>`;
    window._accBatchRows=[];
    loadUsers();
  }catch(e){
    setBtnError(btn);
    showToast('批次匯入失敗：'+e.message);
  }
}

async function loadUsers(){
  const tbody=document.getElementById('users-tbody');if(!tbody)return;
  if(!window._db){tbody.innerHTML='<tr><td colspan="7" class="empty">資料庫未連線</td></tr>';return}
  try{
    const {collection,getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDocs(collection(window._db,'users'));
    if(snap.empty){tbody.innerHTML='<tr><td colspan="7" class="empty">尚無帳號資料</td></tr>';return}
    tbody.innerHTML='';
    const levelRank={S:0,A:1,B:2};
    const rows=[];
    snap.forEach(d=>rows.push({id:d.id,data:d.data()}));
    rows.sort((x,y)=>{
      const lx=x.data.level||'B',ly=y.data.level||'B';
      const rx=levelRank[lx]??3,ry=levelRank[ly]??3;
      if(rx!==ry)return rx-ry;
      const ex=x.data.id||x.id,ey=y.data.id||y.id;
      return String(ex).localeCompare(String(ey));
    });
    rows.forEach(({id,data})=>{
      const isSelf=id===window._uid;
      const tr=document.createElement('tr');tr.dataset.uid=id;const _empId=data.id||(data.email?data.email.replace('tcm','').replace('@tmrt.com.tw',''):'');tr.dataset.search=_empId+(data.name||'');
      const empId=data.id||(data.email?data.email.replace('tcm','').replace('@tmrt.com.tw',''):id);
      const lastLogin=data.lastLoginAt&&typeof data.lastLoginAt.toDate==='function'?data.lastLoginAt.toDate().toLocaleString('zh-TW',{hour12:false}):'從未登入';
      const lvl=data.level||'B';
      const ipCell=lvl==='S'?'<span style="color:var(--ts)">不限制</span>':(data.boundIP?data.boundIP:'<span style="color:var(--ts)">尚未綁定</span>');
      const unbindBtn=(lvl!=='S'&&data.boundIP)?`<button class="btn btn-sm" title="解除IP綁定" onclick="unbindIP('${id}','${empId}')"><i class="ti ti-shield-off"></i></button>`:'';
      tr.innerHTML=`<td>${empId}</td><td>${data.name||'—'}</td><td><span class="badge lv-${lvl.toLowerCase()}">${lvl} 級</span></td><td>${data.createdAt?new Date(data.createdAt.toDate()).toLocaleDateString('zh-TW'):'—'}</td><td style="font-size:11px;color:var(--ts)">${lastLogin}</td><td style="font-size:11px">${ipCell}</td><td style="display:flex;gap:6px"><button class="btn btn-sm" onclick="editAcc('${id}','${data.id}','${data.name||''}','${lvl}')"><i class="ti ti-edit"></i> 編輯</button>${unbindBtn}${!isSelf?`<button class="btn btn-sm btn-danger" onclick="deleteAcc('${id}','${data.id||''}')"><i class="ti ti-trash"></i> 刪除</button>`:''}</td>`;
      tbody.appendChild(tr);
    });
  }catch(e){tbody.innerHTML=`<tr><td colspan="7" class="empty">載入失敗：${e.message}</td></tr>`;}
}

// ===== 版本管理：查找既有有效版本、將舊版下架（保留歷史，不刪除） =====
async function findActiveDoc(collectionName, field, value, title){
  if (!value) return null;
  const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const q = query(collection(window._db, collectionName), where(field,'==',value), where('status','==','active'));
  const snap = await getDocs(q);
  if (snap.empty) return null;
  const normTitle=s=>(s||'').replace(/\s+/g,'').trim();
  let result = null;
  snap.forEach(d => {
    const data=d.data();
    // 若有提供title，必須連名稱也一致才視為同一份文件的新版次；名稱不同則視為獨立文件，不觸發版本取代
    if(title!==undefined && normTitle(data.title)!==normTitle(title)) return;
    result = {id: d.id, data};
  });
  return result;
}

      collectionName='notices';

      payload.unit=getUnitValue('ed-unit');
      payload.issuedDate=document.getElementById('ed-issuedDate')?.value||null;
      payload.expiryDate=document.getElementById('ed-expiryDate')?.value||null;

      payload.revised=document.getElementById('ed-revised')?.value==='1';
      payload.content=document.getElementById('ed-content')?.value||'';
      localArr=window._noticeDocs; renderFn=renderNoticeList;
    } else if(kind==='regulation'){
      collectionName='regulations';
      payload.docNo=document.getElementById('ed-docNo')?.value?.trim()||'';

      payload.version=document.getElementById('ed-version')?.value?.trim()||'';
      payload.dept=document.getElementById('ed-dept')?.value||'';
      payload.parentDoc=document.getElementById('ed-parentDoc')?.value?.trim()||'';
      payload.approvedDate=document.getElementById('ed-approvedDate')?.value||'';
      localArr=window._regListDocs; renderFn=renderRegList;
    } else if(kind==='form'){
      collectionName='forms';
      payload.formNo=document.getElementById('ed-formNo')?.value?.trim()||'';
      payload.version=document.getElementById('ed-version')?.value?.trim()||'';
      payload.dept=document.getElementById('ed-dept')?.value||'';
      payload.approvedDate=document.getElementById('ed-approvedDate')?.value||'';
      localArr=window._formListDocs; renderFn=renderFormList;
    }
    await updateDoc(doc(window._db,collectionName,docId),payload);
    const deptForLog = kind==='notice' ? payload.unit : (payload.dept || (localArr||[]).find(x=>x.id===docId)?.dept || '');
    await logActivity(kind,'update',docId,title,'',deptForLog);
    if(localArr){
      const idx=localArr.findIndex(x=>x.id===docId);
      if(idx>=0) Object.assign(localArr[idx],payload,{updatedAt:{toDate:()=>new Date()}});
    }
    setBtnSuccess(btn,'已儲存');

  }catch(e){
    setBtnError(btn);
    showToast('儲存失敗：'+e.message);
  }

// ===== 歷史版本查詢：查出某文件編號/表單編號的所有版本（不限狀態） =====
async function showVersionHistory(collectionName, field, value, displayTitle){
  const titleEl = document.getElementById('history-modal-title');
  const body = document.getElementById('history-modal-body');
  if (titleEl) titleEl.textContent = `歷史版本 — ${displayTitle||value}`;
  if (body) body.innerHTML = '<div class="pholder">載入中…</div>';
  document.getElementById('modal-history').classList.add('open');
  if (!value) { if (body) body.innerHTML = '<div class="pholder">此文件無編號，無法查詢版本歷史</div>'; return; }
  try {
    const {collection, query, where, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const q = query(collection(window._db, collectionName), where(field, '==', value));
    const snap = await getDocs(q);
    const normTitle=s=>(s||'').replace(/\s+/g,'').trim();
    let list = [];
    snap.forEach(d => list.push({id: d.id, ...d.data()}));
    // 若同編號下有多份不同名稱的獨立文件（如同一編號被拆分成多份文件），僅保留與目前這份名稱一致的版本歷史，避免互相混雜
    if (displayTitle) {
      const filtered = list.filter(d => normTitle(d.title) === normTitle(displayTitle));
      if (filtered.length > 0) list = filtered;
    }
    if (list.length === 0) { body.innerHTML = '<div class="pholder">查無資料</div>'; return; }
    list.sort((a,b) => {
      const va = parseFloat(a.version) || 0, vb = parseFloat(b.version) || 0;
      if (vb !== va) return vb - va;
      return (b.approvedDate||'').localeCompare(a.approvedDate||'');
    });
    body.innerHTML = list.map(d => {
      const isActive = d.status === 'active';
      return `<div class="list-card" style="border-left-color:${isActive?'#3B6D11':'#adb5bd'};${isActive?'':'background:#f8f9fa'}">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px">
          <span class="cat-badge" style="background:${isActive?'#EAF3DE':'#e9ecef'};color:${isActive?'#3B6D11':'#495057'}">${isActive?'現行有效':'已下架（歷史版本）'}</span>
          <span style="font-size:12px;font-weight:600;color:var(--tp)">版次 ${d.version||'—'}</span>
        </div>
        <div style="font-size:12px;color:var(--ts)">核決日期：${d.approvedDate||'—'}${d.fileName?'　檔名：'+escapeHtml(d.fileName):''}</div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-sm" onclick='showFullText(${JSON.stringify(d.title||"")}, ${JSON.stringify(d.fullText||"")}, ${JSON.stringify(d.fileUrl||"")}, ${JSON.stringify(d.fileName||"")}, ${JSON.stringify(collectionName)}, ${JSON.stringify(d.id||"")})'><i class="ti ti-file-text"></i> 查閱全文</button>
          ${(d.fileUrl&&(window._level==='S'||window._level==='A'))?`<a href="${d.fileUrl}" download="${d.fileName||''}" class="btn btn-sm"><i class="ti ti-download"></i> 下載</a>`:''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    if (body) body.innerHTML = `<div class="pholder">載入失敗：${e.message}</div>`;
  }
}

// ===== 查閱全文：顯示擷取出的文字內容，而非直接開啟原始PDF =====
let _hlIndex=0;
function showFullText(title, fullText, fileUrl, fileName, collectionName, docId, kw){
  const titleEl = document.getElementById('viewtext-modal-title');
  const body = document.getElementById('viewtext-modal-body');
  if (titleEl) titleEl.textContent = title || '內文';
  if (body) {
    const canAccessFile = (window._level==='S'||window._level==='A');
    const pdfLink = (fileUrl && canAccessFile) ? `<div style="margin-bottom:10px"><a href="${fileUrl}" target="_blank" class="btn btn-sm"><i class="ti ti-file-type-pdf"></i> 開啟原始檔案（查看完整排版／表格／簽核）</a></div>` : '';
    const canReextract = canAccessFile && collectionName && docId && fileUrl && fileName && isReextractableFile(fileName);
    const reextractBtn = canReextract ? `<button class="btn btn-sm" style="margin-top:10px" onclick='reextractFullText(${JSON.stringify(collectionName)},${JSON.stringify(docId)},${JSON.stringify(fileUrl)},${JSON.stringify(fileName)})'><i class="ti ti-refresh"></i> ${fullText&&fullText.trim()?'重新擷取全文（更新排版）':'從原始檔案重新擷取全文'}</button>` : '';
    const hasKw = kw && String(kw).trim();
    const matchCount = (hasKw && fullText) ? countMatches(fullText, kw) : 0;
    const navBar = (hasKw && matchCount>0) ? `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:12px;color:var(--ts);background:#fff8e1;border:0.5px solid #f0e0a0;border-radius:var(--rs);padding:6px 10px">
      <span>符合「${escapeHtml(kw)}」共 <b>${matchCount}</b> 處，目前第 <b id="hl-nav-idx">1</b> 處</span>
      <button class="btn btn-sm" onclick="hlNav(-1)"><i class="ti ti-chevron-up"></i> 上一筆</button>
      <button class="btn btn-sm" onclick="hlNav(1)"><i class="ti ti-chevron-down"></i> 下一筆</button>
    </div>` : '';
    if (!fullText || !fullText.trim()) {
      body.innerHTML = `${pdfLink}${navBar}<div class="pholder">此文件尚未擷取到文字內容（可能是掃描件沒有文字圖層、舊版.doc格式暫不支援，或此文件是在「全文擷取」功能上線前上傳的舊資料）${canReextract?'，可點下方按鈕嘗試重新擷取':''}</div>${reextractBtn}`;
    } else {
      const rendered = hasKw ? highlightText(fullText, kw) : escapeHtml(fullText);
      body.innerHTML = `${pdfLink}${navBar}<div id="hl-scroll-area" style="white-space:pre-wrap;font-size:12.5px;line-height:1.8;color:var(--tp);max-height:60vh;overflow-y:auto;padding:4px;border:0.5px solid var(--bt);border-radius:var(--rm)">${rendered}</div>${reextractBtn}`;
      if (hasKw && matchCount>0) {
        _hlIndex=0;
        setTimeout(()=>hlJump(0), 50);
      }
    }
  }
  document.getElementById('modal-viewtext').classList.add('open');
}
function hlNav(delta){
  const marks=document.querySelectorAll('#hl-scroll-area .kw-hl');
  if(!marks.length)return;
  _hlIndex=(_hlIndex+delta+marks.length)%marks.length;
  hlJump(_hlIndex);
}
function hlJump(i){
  const marks=document.querySelectorAll('#hl-scroll-area .kw-hl');
  if(!marks.length)return;
  marks.forEach(m=>m.classList.remove('kw-hl-active'));
  const target=marks[i];
  if(target){
    target.classList.add('kw-hl-active');
    target.scrollIntoView({block:'center'});
  }
  const idxEl=document.getElementById('hl-nav-idx');
  if(idxEl)idxEl.textContent=i+1;
}

async function reextractFullText(collectionName, docId, fileUrl, fileName){
  const body = document.getElementById('viewtext-modal-body');
  if (body) body.innerHTML = '<div class="pholder">正在從原始檔案重新擷取全文…</div>';
  try {
    const res = await fetch(fileUrl);
    if (!res.ok) throw new Error('無法下載原始檔案，請確認檔案是否仍存在');
    const blob = await res.blob();
    const fileForExtract = new File([blob], fileName || 'file', {type: blob.type});
    const {text} = await extractFileText(fileForExtract, 500, (i,n,total) => {
      if (body) body.innerHTML = `<div class="pholder">正在擷取中…(第 ${i}/${n} 頁${total>n?`，共${total}頁`:''})</div>`;
    });
    const {doc, updateDoc, serverTimestamp} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await updateDoc(doc(window._db, collectionName, docId), {fullText: text, fullTextUpdatedAt: serverTimestamp()});
    showToast(text.trim() ? '已補上全文索引' : '重新擷取完成，但此文件可能是掃描件或空白內容，仍無文字內容');
    const titleEl = document.getElementById('viewtext-modal-title');
    showFullText(titleEl?titleEl.textContent:'', text, fileUrl, fileName, collectionName, docId);
  } catch(e) {
    if (body) body.innerHTML = `<div class="pholder">重新擷取失敗：${e.message}</div>`;
  }
}

// ===== 批次上傳：規章 =====
async function handleRegBatchFiles(input){
  const files = Array.from(input.files || []).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  const area = document.getElementById('reg-batch-preview');
  if (files.length === 0) { area.innerHTML = '<div class="pholder">資料夾中沒有找到PDF檔案</div>'; return; }
  area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(0/${files.length})</div>`;
  const rows = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const fnMeta = extractMetaFromFilename(file.name);
    try {
      const {text} = await extractPdfText(file, 500, (pi,pn,ptotal)=>{
        area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(檔案 ${i+1}/${files.length}：${escapeHtml(file.name)}，第 ${pi}/${pn} 頁${ptotal>pn?`，共${ptotal}頁`:''})</div>`;
      });
      const meta = extractDocMetaFromText(text, file.name);
      rows.push({
        file, text,
        docNo: (fnMeta&&fnMeta.docNo) || meta.docNo,
        title: (fnMeta&&fnMeta.title) || meta.title,
        dept: (fnMeta&&fnMeta.dept) || meta.dept,
        version: (fnMeta&&fnMeta.version) || meta.version || '',
        approvedDate: meta.approvedDate,
        tier: '2'
      });
    } catch(e) {
      rows.push({
        file, text: '',
        docNo: (fnMeta&&fnMeta.docNo) || '',
        title: (fnMeta&&fnMeta.title) || file.name.replace(/\.[a-zA-Z0-9]+$/,''),
        dept: (fnMeta&&fnMeta.dept) || '',
        version: (fnMeta&&fnMeta.version) || '',
        approvedDate: '', tier: '2', _extractError: e.message
      });
    }
    area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(${i+1}/${files.length})</div>`;
  }
  window._regBatchRows = rows;
  renderRegBatchPreview();
}

  `;

async function confirmRegBatchUpload(){
  const rows = window._regBatchRows || [];
  if (rows.length === 0) return;
  const area = document.getElementById('reg-batch-preview');
  const btn = area.querySelector('.btn-primary');
  setBtnLoading(btn, `上傳中…(0/${rows.length})`);
  let ok=0, fail=0, superseded=0, skippedDup=0;
  try {
    const {collection, addDoc, serverTimestamp} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    for (let i=0; i<rows.length; i++) {
      const r = rows[i];
      try {
        if (!r.title) throw new Error('缺文件名稱');
        const ver = r.version || '1';
        const existing = await findActiveDoc('regulations', 'docNo', r.docNo, r.title);
        if (existing && String(existing.data.version||'') === String(ver)) { skippedDup++; }
        else {
          const fileUrl = await uploadFile(r.file, `regulations/${r.docNo||'unclassified'}/${ver}/${r.file.name}`);
          const docRef = await addDoc(collection(window._db, 'regulations'), {
            docNo: r.docNo || '', title: r.title,
            dept: r.dept || '', tier: parseInt(r.tier) || 2, version: ver,
            approvedDate: r.approvedDate || '', parentDoc: '',
            fileUrl, fileName: r.file.name, fileSize: r.file.size,
            fullText: r.text || '', status: 'active',
            createdAt: serverTimestamp(), uploadedBy: window._uid, importedFromBatch: true
          });
          if (existing) { await supersedeDoc('regulations', existing.id, docRef.id); superseded++; }
          ok++;
        }
      } catch(e) { fail++; }
      if (btn) btn.innerHTML = `<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> 上傳中…(${i+1}/${rows.length})`;
    }
    setBtnSuccess(btn, '已完成');
    if(ok>0) await logActivity('regulation','batch_create','',`批次上傳 ${ok} 份規章`,`${superseded}份取代舊版，${skippedDup}份重複略過`);
    showToast(`已上傳 ${ok} 份規章${superseded?`（其中 ${superseded} 份自動下架舊版本）`:''}${fail?`，${fail} 份失敗`:''}${skippedDup?`，${skippedDup} 份因版次相同已略過`:''}`);
    area.innerHTML = `<div class="info-box"><i class="ti ti-info-circle"></i>批次上傳完成：成功 ${ok} 份${superseded?`（${superseded} 份取代了舊版本）`:''}${fail?`，失敗 ${fail} 份，請檢查後重新上傳失敗的檔案`:''}${skippedDup?`，${skippedDup} 份因文件編號與版次都相同，判定為重複已略過`:''}</div>`;
    window._regBatchRows = [];
  } catch(e) {
    setBtnError(btn);
    showToast('批次上傳失敗：'+e.message);
  }
}

function guessNoticeCategory(text){
  const t=(text||'');
  if(t.includes('票務中心'))return 'ext_ticket';
  if(t.includes('行控中心'))return 'ext_occ';
  if(t.includes('處本部'))return 'ext_hq';
  if(t.includes('維修處'))return 'ext_maint';
  if(t.includes('站務中心'))return 'station';
  return '';
}

async function handleNoticeBatchFiles(input){
  const files = Array.from(input.files || []).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  const area = document.getElementById('notice-batch-preview');
  if (files.length === 0) { area.innerHTML = '<div class="pholder">資料夾中沒有找到PDF檔案</div>'; return; }
  area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(0/${files.length})</div>`;
  const rows = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const {text} = await extractPdfText(file, 500, (pi,pn,ptotal)=>{
        area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(檔案 ${i+1}/${files.length}：${escapeHtml(file.name)}，第 ${pi}/${pn} 頁${ptotal>pn?`，共${ptotal}頁`:''})</div>`;
      });
      let title='';
      const norm = normalizeExtractedText(text);
      const compact = norm.replace(/\s+/g,'');
      const bm = norm.match(/【([\s\S]+?)】/);
      if (bm) title = bm[1].replace(/\s+/g,'').trim();
      if (!title) title = file.name.replace(/\.[a-zA-Z0-9]+$/,'');
      const fromMatch = norm.match(new RegExp('(?:'+flexLabel('發布日期')+'|'+flexLabel('生效日期')+')[:：]?\\s*([0-9]{2,4}[\\/\\-\\.][0-9]{1,2}[\\/\\-\\.][0-9]{1,2})'));
      const toMatch = norm.match(new RegExp('(?:'+flexLabel('到期日期')+'|'+flexLabel('失效日期')+'|'+flexLabel('有效期限至')+')[:：]?\\s*([0-9]{2,4}[\\/\\-\\.][0-9]{1,2}[\\/\\-\\.][0-9]{1,2})'));
      const regMatch = compact.match(/TMRT-[A-Z0-9]{2,6}-[A-Z0-9]{2,6}-\d-\d{3,5}/i);
      rows.push({
        file, text, title,
        category: guessNoticeCategory(norm),
        issuedDate: fromMatch ? parseMinguoDate(fromMatch[1]) : '',
        expiryDate: toMatch ? parseMinguoDate(toMatch[1]) : '',
        linkedRegulation: regMatch ? regMatch[0].toUpperCase() : ''
      });
    } catch(e) {
      rows.push({file, text:'', title:file.name.replace(/\.[a-zA-Z0-9]+$/,''), category:'', issuedDate:'', expiryDate:'', linkedRegulation:'', _extractError:e.message});
    }
    area.innerHTML = `<div class="pholder">正在擷取全文並辨識中…(${i+1}/${files.length})</div>`;
  }
  window._noticeBatchRows = rows;
  renderNoticeBatchPreview();
}

function initDropZone(zoneId, inputId, listId) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const input = document.getElementById(inputId);
    if (!input) return;
    // 建立 DataTransfer 模擬 files 設定
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
    input.files = dt.files;
    showFiles(input, listId);
    input.dispatchEvent(new Event('change', {bubbles:true})); // 觸發 onchange（如自動辨識），與點擊選取行為一致
  });
}

function parseCSV(text){
  const rows=[];let row=[];let field='';let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else {inQuotes=false;} }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/*skip*/}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}

function parseMinguoDate(s){
  if(!s)return '';
  s=String(s).trim();
  if(!s)return '';
  const m=s.match(/^(\d{2,4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
  if(!m)return s;
  let y=parseInt(m[1]),mo=m[2].padStart(2,'0'),d=m[3].padStart(2,'0');
  if(y<1000) y+=1911;
  return `${y}-${mo}-${d}`;
}

let _mammothLoadingPromise=null;
function ensureMammoth(){
  if(window.mammoth) return Promise.resolve(window.mammoth);
  if(_mammothLoadingPromise) return _mammothLoadingPromise;
  _mammothLoadingPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    s.onload=()=>resolve(window.mammoth);
    s.onerror=()=>reject(new Error('Word 解析套件載入失敗，請檢查網路連線'));
    document.head.appendChild(s);
  });
  return _mammothLoadingPromise;
}
async function extractWordText(file){
  const mammoth = await ensureMammoth();
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({arrayBuffer: buf});
  const text = (result.value||'').split('\n').map(l=>l.trim()).filter(l=>l).join('\n');
  return {text, numPages: 1, extractedPages: 1, truncated: false};
}

let _xlsxLoadingPromise=null;
function ensureXlsx(){
  if(window.XLSX) return Promise.resolve(window.XLSX);
  if(_xlsxLoadingPromise) return _xlsxLoadingPromise;
  _xlsxLoadingPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>resolve(window.XLSX);
    s.onerror=()=>reject(new Error('Excel 解析套件載入失敗，請檢查網路連線'));
    document.head.appendChild(s);
  });
  return _xlsxLoadingPromise;
}
async function extractExcelText(file){
  const XLSX = await ensureXlsx();
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  let text = '';
  wb.SheetNames.forEach(name => {
    const sheet = wb.Sheets[name];
    const csv = XLSX.utils.sheet_to_csv(sheet, {blankrows:false}).trim();
    if(csv){ text += `【工作表：${name}】\n${csv}\n\n`; }
  });
  return {text: text.trim(), numPages: wb.SheetNames.length, extractedPages: wb.SheetNames.length, truncated: false};
}

function isExtractableFile(filename){
  const n=(filename||'').toLowerCase();
  return n.endsWith('.pdf')||n.endsWith('.docx')||n.endsWith('.doc')||n.endsWith('.xlsx')||n.endsWith('.xls');
}
function isReextractableFile(filename){
  // 舊版.doc（非.docx）目前解析套件無法處理，僅.docx／PDF／Excel支援重新擷取
  const n=(filename||'').toLowerCase();
  return n.endsWith('.pdf')||n.endsWith('.docx')||n.endsWith('.xlsx')||n.endsWith('.xls');
}
async function extractFileText(file, maxPages, onProgress){
  const name=(file.name||'').toLowerCase();
  if(name.endsWith('.pdf')) return extractPdfText(file, maxPages, onProgress);
  if(name.endsWith('.docx')) return extractWordText(file);
  if(name.endsWith('.doc')) throw new Error('舊版.doc格式暫不支援全文擷取，請另存為.docx後重新上傳，或忽略此訊息（不影響上傳本身）');
  if(name.endsWith('.xlsx')||name.endsWith('.xls')) return extractExcelText(file);
  return {text:'', numPages:0, extractedPages:0, truncated:false};
}

    s.onload=()=>{
      try{
        window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve(window.pdfjsLib);
      }catch(e){reject(e);}
    };
    s.onerror=()=>reject(new Error('PDF.js 載入失敗，請檢查網路連線'));
    document.head.appendChild(s);
  });
  return _pdfJsLoadingPromise;
}

async function extractPdfText(file, maxPages, onProgress){
  maxPages = maxPages || 500; // 實務上規章不太可能超過500頁，此上限僅為防呆，避免極端異常檔案卡死瀏覽器
  const pdfjsLib = await ensurePdfJs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  // 條列／條號開頭樣式：不管行距大小，只要新行開頭符合這些格式，一律視為新行（法規文件常見的條列結構）
  // 依公司「公司規則格式編碼注意事項」(TMRT-HRD-GEN-0-3002) 規範的所有合法編號樣式：
  // 純數字章節(1 目的)、多層小數點(5.1、5.1.1)、中文數字頓號(一、)、括號中文數字((一))、
  // 半形/全形括號數字((1))、英文字母(A. a.)、第X條/章/節/款/項
  const clauseStartPattern = /^(\d+(\.\d+)*[\s、.．]|[一二三四五六七八九十]{1,3}[、.．]|[（(][一二三四五六七八九十0-9]{1,3}[）)]|第[一二三四五六七八九十0-9]+[條章節款項]|[A-Za-z][.、])/;
  let text='';
  const n = Math.min(pdf.numPages, maxPages);
  for(let i=1;i<=n;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    let pageText='';
    let last=null;
    for(const item of content.items){
      if(!item.str){ continue; }
      if(last){
        const sameLine = Math.abs(item.transform[5]-last.transform[5]) < Math.max(2,(item.height||10)*0.4);
        if(!sameLine){
          const gapY = Math.abs(item.transform[5]-last.transform[5]);
          const lineHeight = Math.max(item.height||10, last.height||10, 1);
          const looksLikeNewClause = clauseStartPattern.test(item.str);
          if(gapY > lineHeight*1.7 || looksLikeNewClause){
            pageText += '\n'; // 行距明顯拉大，或這行開頭是條列/條號格式，視為新的一行
          } else {
            pageText += ' '; // 只是同一段落內的自然換行，接空格銜接成連續文字
          }
        } else {
          const gap = item.transform[4] - (last.transform[4] + (last.width||0));
          const charHeight = last.height||10;
          if(gap > charHeight*2.5){
            pageText += ' | '; // 同一行內間距明顯過大，很可能是表格欄位分隔，插入分隔符號方便辨識
          } else if(gap > charHeight*0.28){
            pageText += ' ';
          }
        }
      }
      pageText += item.str;
      last = item;
    }
    text += pageText + '\n';
    if(onProgress && (i % 5 === 0 || i === n)) onProgress(i, n, pdf.numPages);
  }
  // 濾除頁碼：整行只有1~4個數字、沒有其他文字的行，幾乎必定是頁尾頁碼而非真實內容
  text = text.split('\n').filter(line => !/^\s*\d{1,4}\s*$/.test(line)).join('\n');
  return {text, numPages: pdf.numPages, extractedPages: n, truncated: pdf.numPages > maxPages};
}

// ===== 處室樹狀結構展平，供下拉選單與自動比對使用 =====
function flattenLeaves(node, path, out){
  path = path || ''; out = out || [];
  for(const key in node){
    const fp = path ? path+' / '+key : key;
    const ch = node[key];
    if(ch) flattenLeaves(ch, fp, out);
    else out.push({name:key, path:fp});
  }
  return out;
}
function deptOptionsHtml(selected){
  const leaves = flattenLeaves(regTree);
  return '<option value="">請選擇</option>' + leaves.map(l=>`<option value="${l.name}" ${l.name===selected?'selected':''}>${l.path}</option>`).join('');
}
function guessDeptFromCode(code){
  if(!code) return '';
  const up = code.toUpperCase();
  const leaves = flattenLeaves(regTree);
  const hit = leaves.find(l=>l.name.toUpperCase().includes(up));
  return hit ? hit.name : '';
}

// ===== 從PDF全文比對抓取文件metadata（文件編號/處室/版次/核決日期/名稱） =====
function normalizeExtractedText(text){
  return (text||'')
    .replace(/[－—–]/g,'-')      // 全形／各式破折號 統一成半形連字號
    .replace(/：/g,':')           // 全形冒號統一成半形
    .replace(/[\u3000\s]+/g,' '); // 全形空白與各式空白壓成單一半形空白
}
// 產生「字元間可插入任意空白」的寬鬆比對pattern，因PDF擷取常會在字與字間插入雜訊空白
function flexLabel(label){
  return label.split('').map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('\\s*');
}
// 從檔名直接解析文件編號／名稱／版次（許多表單本身就是Word/Excel，沒有PDF全文可讀，檔名反而是最可靠來源）
// 支援格式如：TMRT-ISD-GEN-0-4001職業災害速報表(2版).docx
function extractMetaFromFilename(fileName){
  const base = fileName.replace(/\.[a-zA-Z0-9]+$/, '');
  const docMatch = base.match(/^TMRT-[A-Z0-9]{2,6}-[A-Z0-9]{2,6}-\d-\d{3,5}/i);
  if (!docMatch) return null;
  const docNo = docMatch[0].toUpperCase();
  let rest = base.slice(docMatch[0].length);
  let version = '';
  // 支援版次以底線、括號、空白等各種方式包住，如 _6版_、(6版)、（6版）、 6版
  const verMatch = rest.match(/[_\(（\s]*(\d+)\s*版[_\)）\s]*$/);
  if (verMatch) {
    version = verMatch[1];
    rest = rest.slice(0, verMatch.index);
  }
  const title = rest.replace(/^[_\s\(（]+|[_\s\)）]+$/g, '').trim();
  const parts = docNo.split('-');
  const dept = guessDeptFromCode(parts[1]) || guessDeptFromCode(parts[2]) || '';
  return {docNo, title, version, dept};
}

function extractDocMetaFromText(text, fileName){
  const norm = normalizeExtractedText(text);
  const compact = norm.replace(/\s+/g,''); // 完全去空白版本，專門用來抓文件編號這類代碼（代碼本身不該有空白）
  const docNoMatch = compact.match(/TMRT-[A-Z0-9]{2,6}-[A-Z0-9]{2,6}-\d-\d{3,5}/i);
  const docNo = docNoMatch ? docNoMatch[0].toUpperCase() : '';
  let dept='';
  if(docNo){
    const parts = docNo.split('-');
    dept = guessDeptFromCode(parts[1]) || guessDeptFromCode(parts[2]) || '';
  }
  const verMatch = norm.match(new RegExp(flexLabel('版次')+'[:：]?\\s*([0-9]+)'));
  const version = verMatch ? verMatch[1] : '';
  const dateMatch = norm.match(new RegExp(flexLabel('核決日期')+'[:：]?\\s*([0-9]{2,4}[\\/\\-\\.][0-9]{1,2}[\\/\\-\\.][0-9]{1,2})'));
  const approvedDate = dateMatch ? parseMinguoDate(dateMatch[1]) : '';
  const titleMatch = norm.match(new RegExp(flexLabel('文件名稱')+'[:：]?\\s*([\\s\\S]{2,50}?)(?=\\s*'+flexLabel('文件編號')+'|\\s*'+flexLabel('訂定日期')+'|\\s*'+flexLabel('核決日期')+'|$)'));
  let title = titleMatch ? titleMatch[1].trim() : '';
  if(!title) title = fileName.replace(/\.[a-zA-Z0-9]+$/,'');
  return {docNo, dept, version, approvedDate, title};
}

async function importFromSheets(){
  const urlInput=document.getElementById('dsu')?.value?.trim();
  const sheetName=document.getElementById('dsn')?.value?.trim();
  const area=document.getElementById('sheets-preview-area');
  if(!urlInput){showToast('請貼上 Google Sheets 網址');return;}
  const m=urlInput.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(!m){showToast('網址格式不正確，請貼上完整的 Google Sheets 網址');return;}
  const sheetId=m[1];
  const gidMatch=urlInput.match(/[#&]gid=(\d+)/);
  const csvUrl=gidMatch
    ? `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gidMatch[1]}`
    : `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv${sheetName?('&sheet='+encodeURIComponent(sheetName)):''}`;
  area.innerHTML='<div class="pholder">連線中…</div>';
  try{
    const res=await fetch(csvUrl+(csvUrl.includes('?')?'&':'?')+'_ts='+Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('無法讀取試算表，請確認已設為「知道連結的人可以檢視」');
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2){area.innerHTML='<div class="pholder">試算表無資料</div>';return;}
    const headers=rows[0].map(h=>(h||'').trim());
    const idx=(aliases)=>headers.findIndex(h=>aliases.some(a=>h.includes(a)));
    let iCat=idx(['分類','類別']);
    if(iCat<0) iCat=0; // 標題列若無「分類/類別」字樣，預設沿用第一欄（A欄）作為分類欄位
    const iContent=idx(['事項內容','內容','標題']);
    const iFrom=idx(['發布日期','生效日期']);
    const iTo=idx(['到期日期','失效日期']);
    const iAnn=idx(['宣達者','宣導者','宣導人']);
    const iSeq=idx(['項次']);
    if(iContent<0){area.innerHTML='<div class="pholder">找不到「事項內容」欄位，請確認試算表標題列</div>';return;}
    const norm=s=>(s||'').replace(/\s+/g,'');
    const parsed=[];
    for(let r=1;r<rows.length;r++){
      const row=rows[r];
      if(!row||row.every(c=>!c||!c.trim()))continue;
      const rawContent=(iContent>=0?row[iContent]:'')||'';
      let title=rawContent.trim(),content='';
      const bm=rawContent.match(/【(.+?)】([\s\S]*)/);
      if(bm){title=bm[1].trim();content=bm[2].trim();}
      if(!title)continue; // 合併儲存格造成的空白延伸列，非真實資料，直接略過
      const catText=((iCat>=0?row[iCat]:'')||'').trim();
      const catNorm=norm(catText);
      const cat=DUTY_CATEGORIES.find(c=>catNorm.includes(norm(c.name))||(catNorm&&norm(c.name).includes(catNorm)));
      parsed.push({
        title, content,
        category: cat?cat.id:'',
        categoryText: catText,
        issuedDate: parseMinguoDate(iFrom>=0?row[iFrom]:''),
        expiryDate: parseMinguoDate(iTo>=0?row[iTo]:''),
        announcer: ((iAnn>=0?row[iAnn]:'')||'').trim(),
        seqNo: ((iSeq>=0?row[iSeq]:'')||'').trim()
      });
    }
    if(parsed.length===0){area.innerHTML='<div class="pholder">試算表無有效資料列</div>';return;}
    const {collection,getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDocs(collection(window._db,'duty_briefs'));
    // 比對鍵值＝標題+發布日期+項次，可正確分辨「同標題同日期但項次不同」的獨立資料列
    // legacyMap 保留給尚未儲存過「項次」欄位的舊資料，讓第一筆對上的Sheets列可以完成一次性遷移，避免誤判成新增造成重複
    const existMap=new Map();
    const legacyMap=new Map();
    snap.forEach(doc=>{
      const d=doc.data();
      const baseKey=(d.title||'')+'|'+(d.issuedDate||'');
      if(d.seqNo){ existMap.set(baseKey+'|'+d.seqNo,{id:doc.id,data:d}); }
      else { legacyMap.set(baseKey,{id:doc.id,data:d}); }
    });
    const normWs=s=>(s||'').replace(/[\s\u3000]+/g,' ').trim();
    const SCALAR_FIELDS=[['category','分類'],['announcer','宣達者'],['expiryDate','到期日期']];
    parsed.forEach(p=>{
      const baseKey=p.title+'|'+p.issuedDate;
      const fullKey=baseKey+'|'+p.seqNo;
      let existing=p.seqNo?existMap.get(fullKey):undefined;
      if(!existing && legacyMap.has(baseKey)){
        // 舊資料尚無項次紀錄，讓這次比對到的第一筆Sheets列完成遷移，之後同標題同日期的其他項次會正確視為新增
        existing=legacyMap.get(baseKey);
        legacyMap.delete(baseKey);
        p._migratingSeqNo=true;
      }
      if(!existing){p._status='new';return;}
      const scalarChanged=SCALAR_FIELDS.filter(([f])=>normWs(p[f])!==normWs(existing.data[f])).map(([,label])=>label);
      // 內容改用「上次同步基準」比對，避免合併後資料庫內容變長，下次卻誤判成又有新異動
      const baseline=existing.data.lastSheetContent!==undefined?existing.data.lastSheetContent:existing.data.content;
      const contentChanged=normWs(p.content)!==normWs(baseline);
      const changed=[...scalarChanged, ...(contentChanged?['內容（將自動合併保留兩邊）']:[]), ...(p._migratingSeqNo?['已補上項次編號']:[])];
      if(changed.length===0){p._status='dup';}
      else{p._status='update';p._docId=existing.id;p._changed=changed;p._oldData=existing.data;p._contentChanged=contentChanged;}
    });
    const newRows=parsed.filter(p=>p._status==='new');
    const updateRows=parsed.filter(p=>p._status==='update');
    const dupCount=parsed.filter(p=>p._status==='dup').length;
    window._sheetsImportRows=[...newRows,...updateRows];
    let rowIdx=0;
    const renderRow=p=>{const i=rowIdx++;const cat=DUTY_CATEGORIES.find(c=>c.id===p.category);return `<tr><td><input type="checkbox" class="sheets-row-chk" data-idx="${i}" checked></td><td>${cat?catBadge(cat):('<span class="cat-badge" style="background:#f8d7da;color:#721c24">未辨識：'+(p.categoryText||'空白')+'</span>')}</td><td>${p.title}${!p.announcer?' <span style="color:#E24B4A">（缺宣達者）</span>':''}${!p.issuedDate?' <span style="color:#E24B4A">（缺發布日期）</span>':''}${p._status==='update'?` <span style="color:#856404">（異動：${p._changed.join('、')}）</span> <button class="btn btn-sm" style="padding:2px 8px;font-size:11px" onclick="showSheetsDiff(${i})">檢視差異</button>`:''}</td><td>${p.issuedDate||'—'}</td><td>${p.expiryDate||'—'}</td><td>${p.announcer||'—'}</td></tr>`;};
    area.innerHTML=`
      <div class="info-box"><i class="ti ti-info-circle"></i>共讀取 ${parsed.length} 筆，其中 ${dupCount} 筆完全相同（略過）、${updateRows.length} 筆有異動（分類/宣達者/到期日期將依Sheets覆蓋；內容若不同將自動合併保留兩邊，不會互相蓋掉）、${newRows.length} 筆為全新資料（比對已自動忽略純空白差異）</div>
      ${(newRows.length+updateRows.length)?`<div style="margin-bottom:8px"><label style="font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="sheets-select-all" checked onchange="document.querySelectorAll('.sheets-row-chk').forEach(c=>c.checked=this.checked)"> 全選／全不選</label></div>
      <div class="card" style="padding:0;overflow:hidden;max-height:360px;overflow-y:auto">
        <table class="vtbl"><thead><tr><th style="width:36px"></th><th>分類</th><th>標題</th><th>發布日期</th><th>到期日期</th><th>宣達者</th></tr></thead>
        <tbody>${newRows.map(renderRow).join('')}${updateRows.map(renderRow).join('')}</tbody>
        </table></div>
        <div class="info-box" style="margin-top:10px"><i class="ti ti-info-circle"></i>標記紅字的資料列（分類辨識失敗、缺宣達者或缺發布日期）仍會照常匯入，缺漏欄位將留空；內容差異會自動合併、標記清楚哪段來自Sheets、哪段是資料庫原有內容，不會互相覆蓋；系統會記住這次同步到Sheets的哪個版本，只要Sheets之後沒有再變動，同一筆不會重複出現在異動清單中</div>
        <button class="btn btn-primary" style="margin-top:10px" onclick="confirmSheetsImport()"><i class="ti ti-check"></i> 確認匯入已勾選項目</button>`
      :'<div class="pholder">沒有新資料或異動需要處理</div>'}
    `;
  }catch(e){
    area.innerHTML=`<div class="pholder">連線失敗：${e.message}</div>`;
  }
}

function mergeContent(oldContent, newSheetContent){
  const normWs=s=>(s||'').replace(/[\s\u3000]+/g,' ').trim();
  const oldN=normWs(oldContent), newN=normWs(newSheetContent);
  if(!oldN) return newSheetContent||'';
  if(!newN) return oldContent||'';
  if(oldN===newN) return newSheetContent;
  if(newN.includes(oldN)) return newSheetContent; // Sheets版本已完整涵蓋資料庫原內容，直接採用
  if(oldN.includes(newN)) return oldContent; // 資料庫原內容已完整涵蓋Sheets版本，維持原狀
  const today=new Date().toISOString().slice(0,10);
  return `${newSheetContent}\n\n【以下為資料庫原有內容，於 ${today} Sheets匯入時自動合併保留，請確認是否仍需要，若已無關可自行刪除】\n${oldContent}`;
}

        Sheets 目前內容字數（正規化空白後）：<b>${normWsDiag(p.content).length}</b> 字<br>
        兩者是否相同：<b style="color:${normWsDiag(baseline)===normWsDiag(p.content)?'#27500A':'#E24B4A'}">${normWsDiag(baseline)===normWsDiag(p.content)?'相同（不應判定為異動，若仍出現請截圖回報）':'不同'}</b>
        <div style="margin-top:8px"><div style="font-size:11px;color:var(--ts);margin-bottom:2px">同步基準原始內容：</div><div style="white-space:pre-wrap;padding:6px;background:#fff;border:0.5px solid #e0d0a0;max-height:150px;overflow-y:auto">${baseline?escapeHtml(baseline):'（空白）'}</div></div>
